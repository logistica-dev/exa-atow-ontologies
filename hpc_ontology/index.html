<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ontology Visualizer — Live</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8f4f8; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }

  #header { background: #c5dfe8; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #a0c8d8; flex-shrink: 0; flex-wrap: wrap; }
  #header h1 { font-size: 15px; color: #1a3a4a; white-space: nowrap; }

  #search { padding: 6px 12px; border-radius: 20px; border: 1px solid #a0c8d8; background: white; color: #1a1a2e; font-size: 13px; width: 220px; }
  #search:focus { outline: none; border-color: #2E86AB; }

  #controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toggle-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .toggle-btn.active { background: #2E86AB; border-color: #2E86AB; color: white; }

  #mode-selector { display: flex; gap: 6px; align-items: center; }
  .mode-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; }
  .mode-btn.active { background: #26A69A; border-color: #26A69A; color: white; }

  #main { display: flex; flex: 1; overflow: hidden; }
  #graph { flex: 1; background: #f0f8fb; position: relative; }

  #loading-overlay { position: absolute; inset: 0; background: rgba(240,248,251,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 10; }
  #loading-overlay.hidden { display: none; }
  .spinner { width: 40px; height: 40px; border: 4px solid #a0c8d8; border-top-color: #2E86AB; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-msg { font-size: 13px; color: #1a5f7a; }

  #sidebar { width: 300px; background: #daedf5; border-left: 1px solid #a0c8d8; padding: 16px; overflow-y: auto; flex-shrink: 0; font-size: 12px; color: #1a1a2e; }
  #sidebar h2 { font-size: 13px; color: #1a5f7a; margin-bottom: 10px; border-bottom: 1px solid #a0c8d8; padding-bottom: 6px; }
  #sidebar h3 { font-size: 11px; color: #1a5f7a; margin: 12px 0 6px 0; }

  .node-label { font-size: 16px; font-weight: bold; color: #1a5f7a; margin-bottom: 3px; }
  .node-uri a { color: #2E86AB; text-decoration: underline; word-break: break-all; font-size: 10px; }
  .node-uri a:hover { color: #1a5f7a; }
  .node-uri { margin-bottom: 6px; }
  .node-types { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
  .node-type-badge { background: #2E86AB; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
  .obj-prop-badge { background: #7bb8d4; color: #1a3a4a; font-size: 10px; padding: 2px 7px; border-radius: 10px; cursor: default; }

  .comment-box { background: white; border: 1px solid #a0c8d8; border-radius: 6px; padding: 8px; margin-bottom: 8px; line-height: 1.5; }
  .lang-flag { font-size: 10px; color: #777; margin-bottom: 2px; display: block; }

  .dt-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .dt-table tr:nth-child(even) { background: rgba(255,255,255,0.5); }
  .dt-table td { padding: 4px 6px; font-size: 11px; border-bottom: 1px solid #c8dde8; vertical-align: top; }
  .dt-prop { color: #1a5f7a; font-weight: 600; width: 45%; }
  .dt-val { color: #1a1a2e; word-break: break-word; }

  .annot-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .annot-table tr:nth-child(even) { background: rgba(255,255,255,0.4); }
  .annot-table td { padding: 4px 6px; font-size: 11px; border-bottom: 1px solid #c8dde8; vertical-align: top; }
  .annot-prop { color: #7B1FA2; font-weight: 600; width: 45%; }
  .annot-val { color: #1a1a2e; word-break: break-word; }
  .annot-val a { color: #2E86AB; }

  #legend { margin-bottom: 16px; }
  #class-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 8px; margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #1a1a2e; min-width: 0; }
  .leg-item span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .leg-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .leg-edge { width: 24px; height: 3px; flex-shrink: 0; border-radius: 2px; margin-top: 1px; }
  #edge-legend { display: flex; flex-direction: column; gap: 4px; }

  #stats { margin-top: 12px; font-size: 11px; color: #555; line-height: 1.8; background: white; padding: 8px; border-radius: 6px; border: 1px solid #a0c8d8; }
  #ttl-url { font-size: 10px; color: #888; word-break: break-all; margin-top: 4px; }

  #physics-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; }
  #physics-btn.active { background: #26A69A; border-color: #26A69A; color: white; }

  .placeholder { color: #888; font-style: italic; font-size: 11px; margin-top: 20px; text-align: center; }
  .section-sep { border: none; border-top: 1px solid #a0c8d8; margin: 10px 0; }
</style>
</head>
<body>

<div id="header">
  <h1>🔷 Ontology Visualizer</h1>
  <input id="search" type="text" placeholder="Search nodes…" oninput="searchNodes(this.value)">
  <div id="mode-selector">
    <span style="font-size:11px;color:#888">Mode:</span>
    <button class="mode-btn active" data-mode="full" onclick="setMode(this)">Full</button>
    <button class="mode-btn" data-mode="instances" onclick="setMode(this)">Instances</button>
    <button class="mode-btn" data-mode="classes" onclick="setMode(this)">Classes</button>
  </div>
  <div id="controls">
    <span style="font-size:11px;color:#888">Edges:</span>
    <button class="toggle-btn active" data-type="objectProperty" onclick="toggleEdge(this)">ObjectProperty</button>
    <button class="toggle-btn active" data-type="type" onclick="toggleEdge(this)">rdf:type</button>
    <button class="toggle-btn active" data-type="subClassOf" onclick="toggleEdge(this)">subClassOf</button>
    <button class="toggle-btn active" data-type="equivalentClass" onclick="toggleEdge(this)">equivalentClass</button>
    <button class="toggle-btn active" data-type="subPropertyOf" onclick="toggleEdge(this)">subPropertyOf</button>
    <button class="toggle-btn active" data-type="inverseOf" onclick="toggleEdge(this)">inverseOf</button>
    <button class="toggle-btn active" data-type="domain" onclick="toggleEdge(this)">domain</button>
    <button class="toggle-btn active" data-type="range" onclick="toggleEdge(this)">range</button>
  </div>
  <button id="physics-btn" class="active" onclick="togglePhysics(this)">⚡ Physics ON</button>
  <button class="toggle-btn" onclick="network && network.fit()">⊞ Fit</button>
</div>

<div id="main">
  <div id="graph">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <div id="loading-msg">Fetching ontology…</div>
    </div>
  </div>
  <div id="sidebar">
    <div id="legend">
      <h2>Legend — Node classes</h2>
      <div id="class-legend"></div>
      <hr class="section-sep">
      <h3>Edge types</h3>
      <div id="edge-legend">
        <div class="leg-item"><div class="leg-edge" style="background:#FF9800"></div><span>ObjectProperty</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#aaa;border-top:2px dashed #aaa;height:0"></div><span>rdf:type</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#555"></div><span>subClassOf</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#6A1B9A;border-top:2px dashed #6A1B9A;height:0"></div><span>subPropertyOf</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#E65100;border-top:2px dashed #E65100;height:0"></div><span>inverseOf</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#1565C0;border-top:2px dotted #1565C0;height:0"></div><span>domain</span></div>
        <div class="leg-item"><div class="leg-edge" style="background:#2E7D32;border-top:2px dotted #2E7D32;height:0"></div><span>range</span></div>
      </div>
    </div>
    <hr class="section-sep">
    <h2>Node Inspector</h2>
    <div id="node-info">
      <div class="placeholder">Click any node to inspect its properties</div>
    </div>
    <div id="stats">
      <b>Graph stats</b><br>
      <span id="stat-nodes">Nodes: —</span><br>
      <span id="stat-edges">Edges: —</span><br>
      <span id="stat-mode">Mode: —</span><br>
      <div id="ttl-url"></div>
    </div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const TTL_URL = 'https://cnherrera.github.io/Exa-AToW_onto/hpc_ontology/exaatow_hpc_ontology.ttl';

// ─── RDF Constants ────────────────────────────────────────────────────────────
const RDF_TYPE    = 'http://www.w3.org/1999/02/22-rdf-syntax-ns#type';
const RDFS_SCO    = 'http://www.w3.org/2000/01/rdf-schema#subClassOf';
const RDFS_DOM    = 'http://www.w3.org/2000/01/rdf-schema#domain';
const RDFS_RNG    = 'http://www.w3.org/2000/01/rdf-schema#range';
const RDFS_CMT    = 'http://www.w3.org/2000/01/rdf-schema#comment';
const RDFS_LBL    = 'http://www.w3.org/2000/01/rdf-schema#label';
const RDFS_SEE    = 'http://www.w3.org/2000/01/rdf-schema#seeAlso';
const RDFS_ISDEF  = 'http://www.w3.org/2000/01/rdf-schema#isDefinedBy';
const RDFS_SUBP   = 'http://www.w3.org/2000/01/rdf-schema#subPropertyOf';
const SKOS_PREF   = 'http://www.w3.org/2004/02/skos/core#prefLabel';
const SKOS_ALT    = 'http://www.w3.org/2004/02/skos/core#altLabel';
const SKOS_NOTE   = 'http://www.w3.org/2004/02/skos/core#note';
const SKOS_DEF    = 'http://www.w3.org/2004/02/skos/core#definition';
const SKOS_EXAMPLE= 'http://www.w3.org/2004/02/skos/core#example';
const SKOS_REL    = 'http://www.w3.org/2004/02/skos/core#related';
const SKOS_BROADER= 'http://www.w3.org/2004/02/skos/core#broader';
const SKOS_NARROWER='http://www.w3.org/2004/02/skos/core#narrower';
const OWL_CLASS   = 'http://www.w3.org/2002/07/owl#Class';
const OWL_OP      = 'http://www.w3.org/2002/07/owl#ObjectProperty';
const OWL_DP      = 'http://www.w3.org/2002/07/owl#DatatypeProperty';
const OWL_AP      = 'http://www.w3.org/2002/07/owl#AnnotationProperty';
const OWL_EQC     = 'http://www.w3.org/2002/07/owl#equivalentClass';
const OWL_INV     = 'http://www.w3.org/2002/07/owl#inverseOf';
const OWL_SUB     = 'http://www.w3.org/2002/07/owl#subPropertyOf';
const OWL_ONTO    = 'http://www.w3.org/2002/07/owl#Ontology';
const OWL_THING   = 'http://www.w3.org/2002/07/owl#Thing';
const OWL_NAMED   = 'http://www.w3.org/2002/07/owl#NamedIndividual';
const OWL_SAMEAS  = 'http://www.w3.org/2002/07/owl#sameAs';
const OWL_DIFF    = 'http://www.w3.org/2002/07/owl#differentFrom';

const META_TYPES = new Set([OWL_CLASS, OWL_OP, OWL_DP, OWL_AP, OWL_ONTO,
  'http://www.w3.org/2000/01/rdf-schema#Class',
  'http://www.w3.org/2002/07/owl#Restriction']);

const ANNOT_URI_PROPS = new Set([RDFS_SEE, RDFS_ISDEF, OWL_SAMEAS, OWL_DIFF, SKOS_REL, SKOS_BROADER, SKOS_NARROWER]);
const ANNOT_LIT_PROPS = new Set([SKOS_ALT, SKOS_NOTE, SKOS_DEF, SKOS_EXAMPLE]);

// ─── Turtle Parser ────────────────────────────────────────────────────────────
function expandPrefix(term, prefixes) {
  if (term.startsWith('<') && term.endsWith('>')) return term.slice(1, -1);
  if (term.includes(':')) {
    const colon = term.indexOf(':');
    const prefix = term.slice(0, colon);
    const local = term.slice(colon + 1);
    if (prefixes[prefix] !== undefined) return prefixes[prefix] + local;
  }
  return term;
}

function shortName(uri) {
  if (uri.includes('#')) return uri.split('#').pop();
  return uri.split('/').pop();
}

function cleanLiteral(raw) {
  let v = raw.replace(/^"+|"+$/g, '');
  v = v.replace(/@\w+(-\w+)*$/, '');
  v = v.replace(/\^\^.*$/, '');
  return v.trim();
}

function tokenizeTTL(text) {
  // Replace multiline strings
  text = text.replace(/"""[\s\S]*?"""/g, '"__MLSTRING__"');
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const c = text[i];
    if (' \t\n\r'.includes(c)) { i++; continue; }
    // comment line
    if (c === '#') { while (i < text.length && text[i] !== '\n') i++; continue; }
    // string literal
    if (c === '"') {
      let j = i + 1;
      while (j < text.length && text[j] !== '"') {
        if (text[j] === '\\') j += 2; else j++;
      }
      j++; // closing quote
      // lang tag or datatype
      if (j < text.length && text[j] === '@') {
        let k = j + 1;
        while (k < text.length && !' \t\n\r;.,)'.includes(text[k])) k++;
        tokens.push(text.slice(i, k)); i = k;
      } else if (j + 1 < text.length && text.slice(j, j+2) === '^^') {
        let k = j + 2;
        while (k < text.length && !' \t\n\r;.,)'.includes(text[k])) k++;
        tokens.push(text.slice(i, k)); i = k;
      } else {
        tokens.push(text.slice(i, j)); i = j;
      }
      continue;
    }
    // URI
    if (c === '<') {
      const end = text.indexOf('>', i);
      if (end === -1) { i++; continue; }
      tokens.push(text.slice(i, end + 1)); i = end + 1; continue;
    }
    // punctuation
    if ('.,;()[]'.includes(c)) { tokens.push(c); i++; continue; }
    // prefixed name / keyword
    let j = i;
    while (j < text.length && !' \t\n\r.,;()[]'.includes(text[j])) j++;
    if (j > i) { tokens.push(text.slice(i, j)); i = j; } else i++;
  }
  return tokens;
}

function parseTTL(text) {
  const prefixes = {};
  // Extract @prefix declarations
  const prefixRe = /@prefix\s+(\S+):\s+<([^>]+)>/g;
  let m;
  while ((m = prefixRe.exec(text)) !== null) prefixes[m[1]] = m[2];

  const tokens = tokenizeTTL(text);
  const triples = [];
  let subject = null, predicate = null;
  let i = 0;

  while (i < tokens.length) {
    const t = tokens[i];
    if (t === '.') { subject = null; predicate = null; i++; continue; }
    if (t === ';') { predicate = null; i++; continue; }
    if (t === ',') { i++; continue; }
    if ('()[]'.includes(t)) { i++; continue; }
    if (t.startsWith('_:')) { i++; continue; }

    if (subject === null) {
      subject = expandPrefix(t, prefixes);
      i++; continue;
    }
    if (predicate === null) {
      predicate = (t === 'a') ? RDF_TYPE : expandPrefix(t, prefixes);
      i++; continue;
    }
    // object
    const obj = t.startsWith('"') ? t : expandPrefix(t, prefixes);
    if (subject && predicate && obj) triples.push([subject, predicate, obj]);
    i++;
  }
  return { triples, prefixes };
}

// ─── Graph Builder ────────────────────────────────────────────────────────────
const INSTANCE_PALETTE = [
  {background:'#A5D6A7', border:'#66BB6A'},
  {background:'#7B1FA2', border:'#4a0072'},
  {background:'#2E7D32', border:'#1b5e20'},
  {background:'#C62828', border:'#7f0000'},
  {background:'#F57F17', border:'#b34700'},
  {background:'#00838F', border:'#005662'},
  {background:'#AD1457', border:'#78002e'},
  {background:'#4527A0', border:'#1a0072'},
  {background:'#E65100', border:'#ac1900'},
  {background:'#AED6F1', border:'#85C1E9'},
  {background:'#558B2F', border:'#255d00'},
  {background:'#6A1B9A', border:'#38006b'},
];
const COLOR_DEFAULT = {background:'#FF7043', border:'#bf360c'};

const EDGE_STYLES = {
  subClassOf:     {color:'#555',    dashes:false,  width:2},
  equivalentClass:{color:'#E91E63', dashes:[5,5],  width:2},
  domain:         {color:'#1565C0', dashes:[3,3],  width:1},
  range:          {color:'#2E7D32', dashes:[3,3],  width:1},
  subPropertyOf:  {color:'#6A1B9A', dashes:[5,3],  width:1},
  inverseOf:      {color:'#E65100', dashes:[5,5],  width:1},
  type:           {color:'#aaaaaa', dashes:[4,3],  width:1},
  objectProperty: {color:'#FF9800', dashes:false,  width:2},
};

function buildGraph(triples, mode) {
  const types = {};         // uri → Set of type URIs
  const commentsEn = {};
  const commentsFr = {};
  const labels = {};
  const datatypeVals = {};  // uri → [[prop, val]]
  const annotVals = {};     // uri → [[prop, val]]
  const objPropAssertions = []; // [s, p, o]

  function addToMap(map, key, val) {
    if (!map[key]) map[key] = [];
    map[key].push(val);
  }
  function addType(uri, type) {
    if (!types[uri]) types[uri] = new Set();
    types[uri].add(type);
  }

  // First pass: collect types, labels, comments
  for (const [s, p, o] of triples) {
    if (p === RDF_TYPE) addType(s, o);
    if (p === RDFS_CMT) {
      if (o.endsWith('@en') || o.endsWith('"@en')) {
        commentsEn[s] = cleanLiteral(o);
      } else if (o.endsWith('@fr') || o.endsWith('"@fr')) {
        commentsFr[s] = cleanLiteral(o);
      } else if (!commentsEn[s]) {
        commentsEn[s] = cleanLiteral(o);
      }
    }
    if (p === SKOS_PREF || p === RDFS_LBL) {
      if (o.endsWith('@en') || o.endsWith('"@en')) {
        labels[s] = cleanLiteral(o);
      } else if (!labels[s]) {
        labels[s] = cleanLiteral(o);
      }
    }
  }

  function getLabel(uri) { return labels[uri] || shortName(uri); }
  function getTypes(uri) { return types[uri] || new Set(); }

  function isInstance(uri) {
    const t = getTypes(uri);
    if (t.has(OWL_NAMED)) return true;
    if (t.has(OWL_CLASS) || t.has(OWL_OP) || t.has(OWL_DP) || t.has(OWL_AP) || t.has(OWL_ONTO)) return false;
    for (const x of t) { if (!META_TYPES.has(x)) return true; }
    return false;
  }

  // Second pass: collect property values
  for (const [s, p, o] of triples) {
    if (p === RDF_TYPE || p === RDFS_CMT || p === RDFS_LBL || p === SKOS_PREF) continue;
    if (p.startsWith('http://www.w3.org/2002/07/owl#') && !ANNOT_URI_PROPS.has(p)) continue;
    if (p.startsWith('http://www.w3.org/2000/01/rdf-schema#') && p !== RDFS_SEE && p !== RDFS_ISDEF && p !== RDFS_SCO && p !== RDFS_DOM && p !== RDFS_RNG && p !== RDFS_SUBP) continue;
    if (p.startsWith('http://www.w3.org/1999/02/22-rdf-syntax-ns#')) continue;

    if (ANNOT_LIT_PROPS.has(p) && o.startsWith('"')) {
      addToMap(annotVals, s, [shortName(p), cleanLiteral(o)]);
    } else if (ANNOT_URI_PROPS.has(p) && !o.startsWith('"')) {
      addToMap(annotVals, s, [shortName(p), o]);
    } else if (o.startsWith('"')) {
      addToMap(datatypeVals, s, [shortName(p), cleanLiteral(o)]);
    } else if (o.startsWith('mailto:')) {
      addToMap(datatypeVals, s, [shortName(p), o]);
    } else {
      objPropAssertions.push([s, p, o]);
    }
  }

  // Detect ontology namespace
  let nsPrefix = null;
  for (const [s, p, o] of triples) {
    if (p === RDF_TYPE && o === OWL_ONTO) {
      if (s.includes('#')) { nsPrefix = s.split('#')[0] + '#'; }
      break;
    }
  }
  function isOwn(uri) {
    if (nsPrefix && uri.startsWith(nsPrefix)) return true;
    if (uri.startsWith('http://www.w3.org/')) return false;
    if (uri.startsWith('_:')) return false;
    return true;
  }

  // Build include set
  const includeUris = new Set();
  if (mode === 'instances') {
    for (const [s, p, o] of triples) {
      if (p === RDF_TYPE && isInstance(s) && isOwn(s)) includeUris.add(s);
    }
  } else {
    for (const [s, p, o] of triples) {
      const st = getTypes(s);
      if (st.has(OWL_CLASS)) includeUris.add(s);
      if (p === RDFS_SCO && !o.startsWith('_')) { includeUris.add(s); includeUris.add(o); }
      if (mode === 'full') {
        if (p === RDF_TYPE && !META_TYPES.has(o)) {
          if (!st.has(OWL_CLASS) && !st.has(OWL_OP) && !st.has(OWL_DP)) {
            includeUris.add(s); includeUris.add(o);
          }
        }
        if (st.has(OWL_OP) || st.has(OWL_DP)) includeUris.add(s);
      }
    }
    for (const u of [...includeUris]) { if (!isOwn(u)) includeUris.delete(u); }
  }

  // Assign colors per class
  const classColorMap = {};
  let paletteIdx = 0;
  function getClassColor(cls) {
    if (!classColorMap[cls]) {
      classColorMap[cls] = INSTANCE_PALETTE[paletteIdx % INSTANCE_PALETTE.length];
      paletteIdx++;
    }
    return classColorMap[cls];
  }
  function primaryClass(uri) {
    const t = getTypes(uri);
    const sorted = [...t].sort();
    for (const x of sorted) {
      if (!META_TYPES.has(x) && x !== OWL_THING) return x;
    }
    return null;
  }

  // Build nodes
  const nodeIdMap = {};
  const nodesList = [];
  const sortedUris = [...includeUris].sort();

  sortedUris.forEach((uri, idx) => {
    nodeIdMap[uri] = idx;
    let colorInfo, shape;
    const ut = getTypes(uri);

    if (mode === 'instances') {
      const cls = primaryClass(uri);
      colorInfo = cls ? getClassColor(cls) : COLOR_DEFAULT;
      shape = 'dot';
    } else {
      if (ut.has(OWL_CLASS)) { colorInfo = {background:'#C5E1A5', border:'#000'}; shape = 'box'; }
      else if (ut.has(OWL_OP)) { colorInfo = {background:'#5C6BC0', border:'#3949ab'}; shape = 'ellipse'; }
      else if (ut.has(OWL_DP)) { colorInfo = {background:'#26A69A', border:'#00796b'}; shape = 'ellipse'; }
      else { const cls = primaryClass(uri); colorInfo = cls ? getClassColor(cls) : COLOR_DEFAULT; shape = 'dot'; }
    }

    // Build sidebar data
    const objProps = objPropAssertions
      .filter(([s]) => s === uri)
      .map(([s, p, o]) => [shortName(p), getLabel(o), o]);

    const sidebarData = {
      label: getLabel(uri),
      full_uri: uri,
      rdf_types: [...ut].filter(t => !META_TYPES.has(t)).map(shortName),
      comment_en: commentsEn[uri] || '',
      comment_fr: commentsFr[uri] || '',
      datatype_props: datatypeVals[uri] || [],
      annot_props: annotVals[uri] || [],
      obj_props: objProps,
    };

    nodesList.push({
      id: idx,
      label: getLabel(uri),
      title: getLabel(uri),
      sidebarData,
      color: {background: colorInfo.background, border: colorInfo.border},
      font: {color: 'black', size: 11},
      shape,
      size: 18,
    });
  });

  // Build edges
  const edges = [];
  let edgeId = 0;
  const seenEdges = new Set();

  function addEdge(src, tgt, label, etype) {
    const key = `${src}|${tgt}|${label}`;
    if (seenEdges.has(key)) return;
    if (nodeIdMap[src] === undefined || nodeIdMap[tgt] === undefined) return;
    seenEdges.add(key);
    const style = EDGE_STYLES[etype] || EDGE_STYLES.subClassOf;
    edges.push({
      id: edgeId++,
      from: nodeIdMap[src], to: nodeIdMap[tgt],
      label, type: etype, arrows: 'to',
      dashes: style.dashes, color: {color: style.color}, width: style.width,
      font: {size:9, color:'#333', align:'middle', background:'rgba(255,255,255,0.7)', strokeWidth:0},
      smooth: {type:'curvedCW', roundness:0.15},
    });
  }

  if (mode === 'instances') {
    for (const [s, p, o] of objPropAssertions) {
      if (includeUris.has(s) && includeUris.has(o)) addEdge(s, o, shortName(p), 'objectProperty');
    }
  } else {
    for (const [s, p, o] of triples) {
      if (!includeUris.has(s) || !includeUris.has(o)) continue;
      if (p === RDFS_SCO) addEdge(s, o, 'subClassOf', 'subClassOf');
      else if (p === OWL_EQC) addEdge(s, o, 'equivalentClass', 'equivalentClass');
      else if (p === OWL_INV) addEdge(s, o, 'inverseOf', 'inverseOf');
      else if (p === RDFS_SUBP || p === OWL_SUB) addEdge(s, o, 'subPropertyOf', 'subPropertyOf');
      else if (p === RDFS_DOM) addEdge(s, o, 'domain', 'domain');
      else if (p === RDFS_RNG) addEdge(s, o, 'range', 'range');
      else if (p === RDF_TYPE) {
        const st = getTypes(s);
        if (!st.has(OWL_CLASS) && !st.has(OWL_OP) && !st.has(OWL_DP)) addEdge(s, o, 'type', 'type');
      } else if (!o.startsWith('"')) {
        const st = getTypes(s); const ot = getTypes(o);
        if (!st.has(OWL_CLASS) && !ot.has(OWL_CLASS)) addEdge(s, o, shortName(p), 'objectProperty');
      }
    }
  }

  return {nodesList, edges, classColorMap};
}

// ─── App State ────────────────────────────────────────────────────────────────
let network = null;
let ALL_NODES = [], ALL_EDGES = [];
let nodesDS, edgesDS;
let adjacency = {};
let currentMode = 'instances';
const visibleTypes = new Set(['objectProperty','type','subClassOf','equivalentClass','subPropertyOf','inverseOf','domain','range']);

function getVisibleEdges() {
  return ALL_EDGES.filter(e => visibleTypes.has(e.type));
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Render Graph ─────────────────────────────────────────────────────────────
function renderGraph(nodesList, edges, classColorMap) {
  ALL_NODES = nodesList;
  ALL_EDGES = edges;

  // Update legend
  const classLegend = document.getElementById('class-legend');
  classLegend.innerHTML = '';
  Object.entries(classColorMap).forEach(([cls, color]) => {
    const div = document.createElement('div');
    div.className = 'leg-item';
    div.innerHTML = `<div class="leg-dot" style="background:${color.background};border:2px solid ${color.border}"></div><span title="${escHtml(cls)}">${escHtml(shortName(cls))}</span>`;
    classLegend.appendChild(div);
  });

  // Stats
  document.getElementById('stat-nodes').textContent = `Nodes: ${nodesList.length}`;
  document.getElementById('stat-edges').textContent = `Edges: ${edges.length}`;
  document.getElementById('stat-mode').textContent  = `Mode: ${currentMode}`;
  document.getElementById('ttl-url').innerHTML = `<a href="${TTL_URL}" target="_blank" style="color:#2E86AB;word-break:break-all;font-size:10px">${TTL_URL}</a>`;

  nodesDS = new vis.DataSet(ALL_NODES);
  edgesDS = new vis.DataSet(getVisibleEdges());

  // Adjacency map
  adjacency = {};
  ALL_NODES.forEach(n => adjacency[n.id] = new Set());
  ALL_EDGES.forEach(e => {
    if (adjacency[e.from] !== undefined) adjacency[e.from].add(e.to);
    if (adjacency[e.to] !== undefined) adjacency[e.to].add(e.from);
  });

  const container = document.getElementById('graph');
  const options = {
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {gravitationalConstant:-100, centralGravity:0.01, springLength:140, springConstant:0.06, damping:0.4},
      stabilization: {iterations:300},
    },
    interaction: {hover:true, tooltipDelay:150, navigationButtons:true, keyboard:true},
    edges: {font:{size:9, color:'#555', strokeWidth:0, background:'rgba(255,255,255,0.75)'}, smooth:{type:'curvedCW', roundness:0.15}},
    nodes: {borderWidth:2, borderWidthSelected:3, font:{size:11, color:'black'}, size:18},
  };

  if (network) network.destroy();
  network = new vis.Network(container, {nodes: nodesDS, edges: edgesDS}, options);

  // Click → inspector
  const nodeData = {};
  ALL_NODES.forEach(n => nodeData[n.id] = n);

  network.on('click', function(params) {
    if (params.nodes.length === 0) return;
    const n = nodeData[params.nodes[0]];
    if (!n || !n.sidebarData) return;
    const d = n.sidebarData;
    let html = '';
    html += `<div class="node-label">${escHtml(d.label)}</div>`;
    html += `<div class="node-uri"><a href="${d.full_uri}" target="_blank">${escHtml(d.full_uri)}</a></div>`;
    if (d.rdf_types && d.rdf_types.length > 0) {
      html += '<div class="node-types">';
      d.rdf_types.forEach(t => html += `<span class="node-type-badge">${escHtml(t)}</span>`);
      html += '</div>';
    }
    if (d.obj_props && d.obj_props.length > 0) {
      html += '<div class="node-types" style="margin-top:4px">';
      d.obj_props.forEach(row => html += `<span class="obj-prop-badge" title="${escHtml(row[0])}">${escHtml(row[1])}</span>`);
      html += '</div>';
    }
    if (d.comment_en) html += `<div class="comment-box"><span class="lang-flag">🇬🇧 EN</span>${escHtml(d.comment_en)}</div>`;
    if (d.comment_fr) html += `<div class="comment-box"><span class="lang-flag">🇫🇷 FR</span>${escHtml(d.comment_fr)}</div>`;
    if (d.datatype_props && d.datatype_props.length > 0) {
      html += '<h3>Datatype Properties</h3><table class="dt-table">';
      d.datatype_props.forEach(row => html += `<tr><td class="dt-prop">${escHtml(row[0])}</td><td class="dt-val">${escHtml(row[1])}</td></tr>`);
      html += '</table>';
    }
    if (d.annot_props && d.annot_props.length > 0) {
      html += '<h3>Annotations &amp; Relations</h3><table class="annot-table">';
      d.annot_props.forEach(row => {
        const isLink = row[0] === 'seeAlso' || row[0] === 'hasURL' || row[0] === 'isDefinedBy';
        const val = isLink ? `<a href="${row[1]}" target="_blank">${escHtml(row[1])}</a>` : escHtml(row[1]);
        html += `<tr><td class="annot-prop">${escHtml(row[0])}</td><td class="annot-val">${val}</td></tr>`;
      });
      html += '</table>';
    }
    if (!d.comment_en && !d.comment_fr && !d.datatype_props?.length && !d.annot_props?.length) {
      html += '<div class="placeholder">No properties found.</div>';
    }
    document.getElementById('node-info').innerHTML = html;
  });

  document.getElementById('loading-overlay').classList.add('hidden');
}

// ─── Load TTL ─────────────────────────────────────────────────────────────────
let cachedTriples = null;

async function loadOntology() {
  document.getElementById('loading-overlay').classList.remove('hidden');
  document.getElementById('loading-msg').textContent = 'Fetching ontology…';

  try {
    const resp = await fetch(TTL_URL, {cache: 'no-cache'});
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    document.getElementById('loading-msg').textContent = 'Parsing Turtle…';
    const text = await resp.text();
    const {triples} = parseTTL(text);
    cachedTriples = triples;
    document.getElementById('loading-msg').textContent = 'Building graph…';
    const {nodesList, edges, classColorMap} = buildGraph(triples, currentMode);
    renderGraph(nodesList, edges, classColorMap);
  } catch(e) {
    document.getElementById('loading-msg').textContent = `Error: ${e.message}`;
    console.error(e);
  }
}

// ─── Mode switch ──────────────────────────────────────────────────────────────
function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  if (cachedTriples) {
    document.getElementById('loading-overlay').classList.remove('hidden');
    document.getElementById('loading-msg').textContent = 'Building graph…';
    setTimeout(() => {
      const {nodesList, edges, classColorMap} = buildGraph(cachedTriples, currentMode);
      renderGraph(nodesList, edges, classColorMap);
    }, 50);
  }
}

// ─── Search ───────────────────────────────────────────────────────────────────
function searchNodes(query) {
  if (!nodesDS) return;
  const q = query.trim().toLowerCase();
  if (!q) {
    nodesDS.update(ALL_NODES.map(n => ({id:n.id, hidden:false, opacity:1, borderWidth:2})));
    edgesDS.clear(); edgesDS.add(getVisibleEdges());
    return;
  }
  const matchedIds = new Set();
  ALL_NODES.forEach(n => {
    const sd = n.sidebarData || {};
    if ((n.label||'').toLowerCase().includes(q) ||
        (sd.full_uri||'').toLowerCase().includes(q) ||
        (sd.comment_en||'').toLowerCase().includes(q) ||
        (sd.datatype_props||[]).some(r => r[1].toLowerCase().includes(q)) ||
        (sd.annot_props||[]).some(r => r[1].toLowerCase().includes(q))) {
      matchedIds.add(n.id);
    }
  });
  const neighborIds = new Set();
  matchedIds.forEach(id => (adjacency[id]||new Set()).forEach(nb => neighborIds.add(nb)));
  const visibleIds = new Set([...matchedIds, ...neighborIds]);
  nodesDS.update(ALL_NODES.map(n => ({
    id: n.id,
    hidden: !visibleIds.has(n.id),
    borderWidth: matchedIds.has(n.id) ? 4 : 2,
    opacity: matchedIds.has(n.id) ? 1 : 0.75,
  })));
  edgesDS.clear();
  edgesDS.add(getVisibleEdges().filter(e => visibleIds.has(e.from) && visibleIds.has(e.to)));
}

// ─── Toggle edge types ────────────────────────────────────────────────────────
function toggleEdge(btn) {
  const etype = btn.dataset.type;
  btn.classList.toggle('active');
  visibleTypes.has(etype) ? visibleTypes.delete(etype) : visibleTypes.add(etype);
  if (!edgesDS) return;
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (q) { searchNodes(q); } else { edgesDS.clear(); edgesDS.add(getVisibleEdges()); }
}

// ─── Toggle physics ───────────────────────────────────────────────────────────
let physicsOn = true;
function togglePhysics(btn) {
  physicsOn = !physicsOn;
  if (network) network.setOptions({physics:{enabled:physicsOn}});
  btn.textContent = physicsOn ? '⚡ Physics ON' : '⚡ Physics OFF';
  btn.classList.toggle('active', physicsOn);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadOntology();
</script>
