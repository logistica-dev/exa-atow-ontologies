<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ontology Visualizer — Ontology — exaatow_hpc_ontology.ttl</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8f4f8; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }

  #header { background: #c5dfe8; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #a0c8d8; flex-shrink: 0; }
  #header h1 { font-size: 15px; color: #1a3a4a; white-space: nowrap; }

  #search { padding: 6px 12px; border-radius: 20px; border: 1px solid #a0c8d8; background: white; color: #1a1a2e; font-size: 13px; width: 220px; }
  #search:focus { outline: none; border-color: #2E86AB; }

  #controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toggle-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .toggle-btn.active { background: #2E86AB; border-color: #2E86AB; color: white; }

  #main { display: flex; flex: 1; overflow: hidden; }
  #graph { flex: 1; background: #f0f8fb; }

  #sidebar { width: 280px; background: #daedf5; border-left: 1px solid #a0c8d8; padding: 16px; overflow-y: auto; flex-shrink: 0; font-size: 12px; color: #1a1a2e; }
  #sidebar h2 { font-size: 13px; color: #1a5f7a; margin-bottom: 12px; border-bottom: 1px solid #a0c8d8; padding-bottom: 6px; }
  #node-info { line-height: 1.6; }
  #node-info .label { font-size: 15px; font-weight: bold; color: #1a5f7a; margin-bottom: 4px; }
  #node-info .uri { font-size: 10px; color: #555; margin-bottom: 10px; word-break: break-all; }
  #node-info .comment { margin-top: 8px; padding: 8px; background: white; border-radius: 6px; line-height: 1.5; border: 1px solid #a0c8d8; }
  #node-info .lang-flag { font-size: 11px; color: #777; }

  #legend { margin-top: 16px; }
  #legend h3 { font-size: 11px; color: #1a5f7a; margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: #1a1a2e; }
  .leg-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  #stats { margin-top: 16px; font-size: 11px; color: #555; line-height: 1.8; }
  
  #physics-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; }
  #physics-btn.active { background: #26A69A; border-color: #26A69A; color: white; }

  .placeholder { color: #888; font-style: italic; font-size: 11px; margin-top: 20px; text-align: center; }
</style>
</head>
<body>

<div id="header">
  <h1>🔷 Ontology — exaatow_hpc_ontology.ttl</h1>
  <input id="search" type="text" placeholder="Search nodes…" oninput="searchNodes(this.value)">
  <div id="controls">
    <span style="font-size:11px;color:#888">Show edges:</span>
    <button class="toggle-btn active" data-type="subClassOf" onclick="toggleEdge(this)">subClassOf</button>
    <button class="toggle-btn active" data-type="equivalentClass" onclick="toggleEdge(this)">equivalentClass</button>
    <button class="toggle-btn active" data-type="subPropertyOf" onclick="toggleEdge(this)">subPropertyOf</button>
    <button class="toggle-btn" data-type="domain" onclick="toggleEdge(this)">domain</button>
    <button class="toggle-btn" data-type="range" onclick="toggleEdge(this)">range</button>
    <button class="toggle-btn" data-type="inverseOf" onclick="toggleEdge(this)">inverseOf</button>
    <button class="toggle-btn active" data-type="type" onclick="toggleEdge(this)">rdf:type</button>
  </div>
  <button id="physics-btn" class="active" onclick="togglePhysics(this)">⚡ Physics ON</button>
  <button class="toggle-btn" onclick="network.fit()">⊞ Fit</button>
</div>

<div id="main">
  <div id="graph"></div>
  <div id="sidebar">
    <div id="legend">
      <h3>Legend — Node types</h3>
      <div id="branch-legend"></div>
      <div class="leg-item"><div class="leg-dot" style="background:#5C6BC0"></div>Object property</div>
      <div class="leg-item"><div class="leg-dot" style="background:#26A69A"></div>Datatype property</div>
      <div class="leg-item"><div class="leg-dot" style="background:#FF7043"></div>Instance</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1a3a4a"></div>Root class</div>
      <br>
      <h3>Legend — Edge types</h3>
      <div class="leg-item"><div class="leg-dot" style="background:#555;border-radius:0;height:3px;margin-top:5px"></div>subClassOf</div>
      <div class="leg-item"><div class="leg-dot" style="background:#E91E63;border-radius:0;height:2px;margin-top:5px"></div>equivalentClass</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1565C0;border-radius:0;height:2px;margin-top:5px"></div>domain</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2E7D32;border-radius:0;height:2px;margin-top:5px"></div>range</div>
      <div class="leg-item"><div class="leg-dot" style="background:#888;border-radius:0;height:2px;margin-top:5px;border-top:2px dotted #888"></div>rdf:type</div>
    </div>
    <h2>Node Inspector</h2>
    <div id="node-info">
      <div class="placeholder">Click any node to see its description</div>
    </div>
    <div id="stats">
      <b>Graph stats</b><br>
      Nodes: 148<br>
      Edges: 209<br>
      Mode: full
    </div>
  </div>
</div>

<script>
const ALL_NODES = [{"id": 0, "label": "AOCC", "title": "<b>AOCC   <i>AOCC</i>  🇬🇧 AMD Optimizing C/C++ and Fortran Compilers — required for Jean Zay A100 partition (gpu_p5, AMD EPYC nodes).", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 1, "label": "Accelerated Node", "title": "<b>Accelerated Node   <i>AcceleratedNode</i>  🇬🇧 A compute node equipped with both CPUs and accelerators such as GPUs. 🇫🇷 Un nœud de calcul équipé à la fois de CPU et d'accélérateurs comme des GPU.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box"}, {"id": 2, "label": "Accelerator Card", "title": "<b>Accelerator Card   <i>AcceleratorCard</i>  🇬🇧 Physical card hosting one or more GPU/accelerator dies (e.g. NVIDIA A100 SXM4 80 GB). 🇫🇷 Carte physique hébergeant un ou plusieurs GPU/accélérateurs (ex : NVIDIA A100 SXM4 80 Go).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 3, "label": "Bandwidth", "title": "<b>Bandwidth   <i>Bandwidth</i>  🇬🇧 Data transfer rate of an interconnect or memory bus (e.g. 200 Gb/s, 2 TB/s HBM3). 🇫🇷 Débit de transfert de données d'un interconnexion ou bus mémoire.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 4, "label": "CPU", "title": "<b>CPU   <i>CPU</i>  🇬🇧 The central processing unit responsible for executing general-purpose instructions. 🇫🇷 L'unité centrale de traitement responsable de l'exécution des instructions générales.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 5, "label": "Compiler", "title": "<b>Compiler   <i>Compiler</i>  🇬🇧 Software tool for compiling source code (e.g., GCC, Intel oneAPI, NVCC, AOCC). 🇫🇷 Outil logiciel pour compiler le code source.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 6, "label": "Compute Node", "title": "<b>Compute Node   <i>ComputeNode</i>  🇬🇧 A physical or virtual machine in an HPC system that executes computational jobs. 🇫🇷 Une machine physique ou virtuelle dans un système HPC qui exécute des tâches de calcul.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 7, "label": "Cooling System", "title": "<b>Cooling System   <i>CoolingSystem</i>  🇬🇧 System maintaining temperature conditions of HPC components. 🇫🇷 Système maintenant les conditions de température des composants HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 8, "label": "Core", "title": "<b>Core   <i>Core</i>  🇬🇧 A processing unit within a CPU or GPU capable of executing tasks concurrently. 🇫🇷 Une unité de traitement au sein d'un CPU ou GPU capable d'exécuter des tâches simultanément.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 9, "label": "Cray Compiler", "title": "<b>Cray Compiler   <i>CrayCC</i>  🇬🇧 HPE Cray Compiling Environment (CCE) for C, C++ and Fortran.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 10, "label": "Die Size", "title": "<b>Die Size   <i>DieSize</i>  🇬🇧 The physical area of the CPU or GPU die. Used in environmental impact estimation. 🇫🇷 Surface physique du die silicium d'un CPU ou GPU en mm². Utilisée pour l'estimation du carbone incorporé et des coûts de fabrication.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 11, "label": "Energy Management System", "title": "<b>Energy Management System   <i>EnergyManagement</i>  🇬🇧 Infrastructure and tools for monitoring, optimizing, and controlling power usage within the HPC environment. 🇫🇷 Infrastructure et outils pour surveiller, optimiser et contrôler la consommation d'énergie dans l'environnement HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 12, "label": "File System", "title": "<b>File System   <i>FileSystem</i>  🇬🇧 Shared storage infrastructure for I/O and checkpoint data in HPC environments. 🇫🇷 IOnfrastructure de stockage partagée utilisée pour les données d'entrée/sortie et les points de sauvegarde dans les environnements HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 13, "label": "Frequency", "title": "<b>Frequency   <i>Frequency</i>  🇬🇧 Clock frequency of a processor, including value and unit (e.g., GHz). 🇫🇷 Fréquence d'horloge d'un processeur (e.g., GHz.).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 14, "label": "Frontend Node", "title": "<b>Frontend Node   <i>FrontendNode</i>  🇬🇧 Login/frontend node for user access, job submission, and compilation. 🇫🇷 Nœud frontal pour l'accès utilisateur, la soumission de tâches et la compilation.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 15, "label": "Funding Agency", "title": "<b>Funding Agency   <i>FundingAgency</i>  🇬🇧 Agency funding HPC infrastructure (e.g. GENCI, ANR, European Commission, France 2030). 🇫🇷 Agence finançant l'infrastructure HPC (ex : GENCI, ANR, Commission européenne, France 2030).", "color": {"background": "#C62828", "border": "#7f0000"}, "font": {"color": "white"}, "shape": "box"}, {"id": 16, "label": "GCC", "title": "<b>GCC   <i>GCC</i>  🇬🇧 GNU Compiler Collection.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 17, "label": "GPFS / Spectrum Scale", "title": "<b>GPFS / Spectrum Scale   <i>GPFS</i>  🇬🇧 IBM General Parallel File System (Spectrum Scale), used at TGCC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 18, "label": "GPU", "title": "<b>GPU   <i>GPU</i>  🇬🇧 Graphics processing unit used to accelerate parallel computation tasks in HPC workloads. 🇫🇷 Un processeur graphique utilisé pour accélérer les tâches de calcul parallèle dans les charges de travail HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 19, "label": "HBM Memory", "title": "<b>HBM Memory   <i>HBMMemory</i>  🇬🇧 High Bandwidth Memory used on GPU accelerators (e.g. HBM2e on A100, HBM3 on H100). 🇫🇷 Mémoire haute bande passante utilisée sur les accélérateurs GPU (ex : HBM2e sur A100, HBM3 sur H100).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 20, "label": "HDD", "title": "<b>HDD   <i>HDD</i>  🇬🇧 A hard disk drive offering persistent storage, typically with higher capacity but lower I/O speed than SSDs. 🇫🇷 Un disque dur offrant un stockage persistant, généralement avec une plus grande capacité mais une vitesse d'E/S inférieure.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 21, "label": "HPC Center", "title": "<b>HPC Center   <i>HPCCenter</i>  🇬🇧 Institutional entity that operates and hosts one or more supercomputers. 🇫🇷 Entité institutionnelle qui exploite et héberge un ou plusieurs supercalculateurs.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box"}, {"id": 22, "label": "HPC Resource", "title": "<b>HPC Resource   <i>HPCResource</i>  🇬🇧 Root class for all physical, logical, and infrastructural resources involved in high-performance computing. 🇫🇷 Classe racine pour toutes les ressources physiques, logiques et infrastructurelles du calcul haute performance.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box"}, {"id": 23, "label": "Hardware Generation", "title": "<b>Hardware Generation   <i>HardwareGeneration</i>  🇬🇧 A discrete hardware generation or extension phase of a supercomputer (e.g. Jean Zay H100 extension, 2023). 🇫🇷 Génération matérielle ou phase d'extension d'un superordinateur (ex : extension H100 de Jean Zay).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 24, "label": "InfiniBand", "title": "<b>InfiniBand   <i>InfiniBand</i>  🇬🇧 InfiniBand high-speed network fabric (multiple generations: HDR 200 Gb/s, NDR 400 Gb/s).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 25, "label": "InfiniBand HDR", "title": "<b>InfiniBand HDR   <i>InfiniBandHDR</i>  🇬🇧 InfiniBand HDR (High Data Rate) - 200 Gb/s per port.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 26, "label": "InfiniBand NDR", "title": "<b>InfiniBand NDR   <i>InfiniBandNDR</i>  🇬🇧 InfiniBand NDR (Next Data Rate) - 400 Gb/s per port. Used in Jean Zay H100 partition (gpu_p6).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 27, "label": "Infrastructure", "title": "<b>Infrastructure   <i>Infrastructure</i>  🇬🇧 Facility-level support systems (cooling, power, energy management). 🇫🇷 Systèmes de support au niveau installation (refroidissement, alimentation, gestion de l'énergie).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 28, "label": "Intel Compiler", "title": "<b>Intel Compiler   <i>IntelCompiler</i>  🇬🇧 Intel oneAPI DPC++/C++ and Fortran Compilers.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 29, "label": "Intel Omni-Path", "title": "<b>Intel Omni-Path   <i>IntelOmniPath</i>  🇬🇧 Intel's high-performance interconnect technology (OPA - 100 Gb/s).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 30, "label": "Interconnect", "title": "<b>Interconnect   <i>Interconnect</i>  🇬🇧 High-speed network infrastructure enabling communication between compute nodes and system components. 🇫🇷 Infrastructure réseau à haute vitesse permettant la communication entre les nœuds de calcul et les composants du système.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 31, "label": "LSF", "title": "<b>LSF   <i>LSF</i>  🇬🇧 Load Sharing Facility.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 32, "label": "Lifetime", "title": "<b>Lifetime   <i>Lifetime</i>  🇬🇧 Operational lifespan of a hardware component (years), such as a server or processor. 🇫🇷 Durée de vie opérationnelle d'un composant matériel (années).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 33, "label": "Linux", "title": "<b>Linux   <i>Linux</i> ", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 34, "label": "Logical Resource", "title": "<b>Logical Resource   <i>LogicalResource</i>  🇬🇧 Software-defined or abstract resource exposed to users or schedulers. 🇫🇷 Ressource définie par logiciel ou abstraite exposée aux utilisateurs ou aux ordonnanceurs.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 35, "label": "Lustre", "title": "<b>Lustre   <i>Lustre</i>  🇬🇧 Open-source parallel distributed file system, widely used in HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 36, "label": "Memory", "title": "<b>Memory   <i>Memory</i>  🇬🇧 Volatile memory components used during computation (DRAM, HBM, etc.). 🇫🇷 Composants de mémoire volatile utilisés pendant le calcul (DRAM, HBM, etc.).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 37, "label": "Memory Capacity", "title": "<b>Memory Capacity   <i>MemoryCapacity</i>  🇬🇧 Amount of data that can be stored in a memory device like RAM, SSD, or HDD (GB, TB). 🇫🇷 Quantité de données qu'un dispositif de mémoire peut stocker (Go, To).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 38, "label": "Module Environment", "title": "<b>Module Environment   <i>ModuleEnvironment</i>  🇬🇧 Software environment for dynamic module loading (e.g. Lmod, Environment Modules). 🇫🇷 Environnement logiciel pour le chargement dynamique de modules (ex : Lmod, Environment Modules).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 39, "label": "NVCC", "title": "<b>NVCC   <i>NVCC</i>  🇬🇧 NVIDIA CUDA Compiler.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 40, "label": "NVMe", "title": "<b>NVMe   <i>NVMe</i>  🇬🇧 NVMe-based solid state drive, typically used as local scratch on HPC nodes. 🇫🇷 Disque SSD NVMe, typiquement utilisé comme stockage scratch local sur les nœuds HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 41, "label": "Operating System", "title": "<b>Operating System   <i>OperatingSystem</i>  🇬🇧 Operating system running on HPC nodes. 🇫🇷 Système d'exploitation exécuté sur les nœuds HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 42, "label": "Organization", "title": "<b>Organization   <i>Organization</i>  🇬🇧 Legal entity operating, owning, or funding HPC facilities. 🇫🇷 Entité légale qui exploite, possède ou finance des installations HPC.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box"}, {"id": 43, "label": "PBS", "title": "<b>PBS   <i>PBS</i>  🇬🇧 Portable Batch System — used at CEA/TGCC.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 44, "label": "Parallel File System", "title": "<b>Parallel File System   <i>ParallelFileSystem</i>  🇬🇧 Distributed file system for parallel I/O operations. 🇫🇷 Système de fichiers distribué pour les opérations d'E/S parallèles à haut débit.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 45, "label": "Parallel Library", "title": "<b>Parallel Library   <i>ParallelLibrary</i>  🇬🇧 Parallel programming library or framework (e.g. OpenMPI, MPICH, CUDA, ROCm, OpenMP). 🇫🇷 Bibliothèque ou framework de programmation parallèle (ex : OpenMPI, CUDA, ROCm, OpenMP).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 46, "label": "Partition", "title": "<b>Partition   <i>Partition</i>  🇬🇧 Logical grouping of compute nodes within a supercomputer sharing hardware characteristics or workload type, mapped to a scheduler partition (SLURM, PBS). 🇫🇷 Regroupement logique de nœuds de calcul partageant des caractéristiques matérielles ou des types de charge de travail, associé à une partition d'ordonnanceur (SLURM, PBS).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 47, "label": "Peak Performance", "title": "<b>Peak Performance   <i>PeakPerformance</i>  🇬🇧 Theoretical peak performance (Rpeak) in FLOPS (e.g. TFLOPS, PFLOPS). 🇫🇷 Performance crête théorique (Rpeak) en FLOPS (ex : TFLOPS, PFLOPS).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 48, "label": "Performance Metric", "title": "<b>Performance Metric   <i>PerformanceMetric</i>  🇬🇧 Measure of computational performance. 🇫🇷 Mesure de la performance de calcul.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 49, "label": "Physical Resource", "title": "<b>Physical Resource   <i>PhysicalResource</i>  🇬🇧 Tangible hardware component of an HPC system. 🇫🇷 Composant matériel tangible d'un système HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 50, "label": "Power Consumption", "title": "<b>Power Consumption   <i>PowerConsumption</i>  🇬🇧 Electrical power consumption of a component or system, in Watts or MW. Used for energy/environmental analysis. 🇫🇷 Consommation électrique d'un composant ou d'un système en Watts ou MW.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 51, "label": "Power Distribution Unit (PDU)", "title": "<b>Power Distribution Unit (PDU)   <i>PowerDistributionUnit</i>  🇬🇧 Hardware unit distributing electrical power to racks and nodes; its metered output feeds PUE calculations. 🇫🇷 Unité matérielle distribuant l'énergie électrique aux baies et nœuds ; sa mesure alimente les calculs de PUE.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 52, "label": "Pre/Post-processing Node", "title": "<b>Pre/Post-processing Node   <i>PrePostNode</i>  🇬🇧 Dedicated pre/post-processing node with large memory, not deducted from CPU/GPU allocation (e.g. jean-zay-pp at IDRIS). 🇫🇷 Nœud dédié au pré/post-traitement avec grande mémoire, non décompté de l'allocation (ex : jean-zay-pp à l'IDRIS).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 53, "label": "Process Node", "title": "<b>Process Node   <i>ProcessNode</i>  🇬🇧 [Semiconductor manufacturing] Specific generation of integrated circuit fabrication technology defined by the minimum feature size of transistors and interconnects, typically measured in nanometers (nm), where smaller nodes enable denser integration of components, higher performance, and reduced power consumption in devices such as microprocessors and memory chips. 🇫🇷 Nœud de procédé de fabrication de semiconducteurs en nm (ex : 7 nm, 4 nm). Corrélé à l'efficacité énergétique et à la taille de puce.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 54, "label": "Processor", "title": "<b>Processor   <i>Processor</i>  🇬🇧 A general category for processing units, including CPUs and GPUs. 🇫🇷 Catégorie générale pour les unités de traitement, y compris les CPU et les GPU.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 55, "label": "Quality of Service (QoS)", "title": "<b>Quality of Service (QoS)   <i>QoS</i>  🇬🇧 Scheduler QoS class defining job time limits, priority, and resource caps for a partition (e.g. qos_gpu-t3). 🇫🇷 Classe QoS de l'ordonnanceur définissant les limites de temps, la priorité et les plafonds de ressources (ex : qos_gpu-t3).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 56, "label": "Quantitative Value", "title": "<b>Quantitative Value   <i>QuantitativeValue</i>  🇬🇧 A value with an associated unit of measurement. 🇫🇷 Valeur numérique avec une unité de mesure associée.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box"}, {"id": 57, "label": "RAM", "title": "<b>RAM   <i>RAM</i>  🇬🇧 Main volatile memory used by compute nodes for temporary data access during job execution (DRAM). 🇫🇷 Mémoire principale volatile utilisée par les nœuds de calcul (DRAM).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 58, "label": "Rack", "title": "<b>Rack   <i>Rack</i>  🇬🇧 A physical chassis housing multiple compute nodes and infrastructure elements in a datacenter. 🇫🇷 Un châssis physique abritant plusieurs nœuds de calcul et éléments d'infrastructure dans un centre de données.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 59, "label": "Red Hat", "title": "<b>Red Hat   <i>RedHat</i> ", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 60, "label": "Resource Manager", "title": "<b>Resource Manager   <i>ResourceManager</i>  🇬🇧 Software system for job scheduling and resource allocation (e.g., SLURM, PBS, LSF). 🇫🇷 Système logiciel pour la planification des tâches et l'allocation des ressources.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 61, "label": "SLURM", "title": "<b>SLURM   <i>SLURM</i>  🇬🇧 Simple Linux Utility for Resource Management — the standard job scheduler at IDRIS (Jean Zay).", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 62, "label": "SSD", "title": "<b>SSD   <i>SSD</i>  🇬🇧 A solid-state drive offering high-speed persistent storage for jobs requiring fast I/O. 🇫🇷 Un disque SSD offrant un stockage persistant à haute vitesse pour les tâches nécessitant des E/S rapides.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 63, "label": "Scalar Node", "title": "<b>Scalar Node   <i>ScalarNode</i>  🇬🇧 A compute node equipped with general-purpose CPUs only (no accelerators). 🇫🇷 Un nœud de calcul équipé uniquement de processeurs généraux (CPU), sans accélérateurs.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box"}, {"id": 64, "label": "Server", "title": "<b>Server   <i>Server</i>  🇬🇧 A physical server housing processors, memory, and storage. 🇫🇷 Un serveur physique contenant des processeurs, de la mémoire et du stockage.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 65, "label": "HPE Cray Slingshot", "title": "<b>HPE Cray Slingshot   <i>SlingShot</i>  🇬🇧 HPE Cray Slingshot high-speed interconnect (200 Gb/s), used on HPE Cray EX systems.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 66, "label": "Software", "title": "<b>Software   <i>Software</i>  🇬🇧 General class for software used in HPC environments.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 67, "label": "Software Version", "title": "<b>Software Version   <i>SoftwareVersion</i>  🇬🇧 A specific version/installation of software on a system.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box"}, {"id": 68, "label": "Storage", "title": "<b>Storage   <i>Storage</i>  🇬🇧 Persistent storage devices and systems. 🇫🇷 Dispositifs et systèmes de stockage persistant.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 69, "label": "Storage Capacity", "title": "<b>Storage Capacity   <i>StorageCapacity</i>  🇬🇧 Total persistent storage capacity (TB, PB). 🇫🇷 Capacité totale de stockage persistant (To, Po).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 70, "label": "Storage Mount", "title": "<b>Storage Mount   <i>StorageMount</i>  🇬🇧 A specific storage mountpoint or workspace exposed to users (e.g. $HOME, $SCRATCH, $STORE, $WORK). 🇫🇷 Un point de montage ou espace de travail spécifique exposé aux utilisateurs (ex : $HOME, $SCRATCH, $STORE, $WORK).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 71, "label": "Supercomputer", "title": "<b>Supercomputer   <i>Supercomputer</i>  🇬🇧 High-performance computing system composed of compute nodes, storage, and networking (Jean Zay, Adastra, Irene). 🇫🇷 Système de calcul haute performance composé de nœuds de calcul, stockage et réseau (Jean Zay, Adastra, Irene).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 72, "label": "TDP", "title": "<b>TDP   <i>TDP</i>  🇬🇧 Manufacturer-specified Thermal Design Power (Watts): maximum sustained power the processor's cooling system must dissipate under typical HPC workloads. 🇫🇷 Puissance thermique de conception (TDP) spécifiée par le fabricant (en Watts): puissance maximale soutenue que le système de refroidissement du processeur doit dissiper sous charges HPC typiques.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 73, "label": "Throughput", "title": "<b>Throughput   <i>Throughput</i>  🇬🇧 I/O performance of storage system, including value and unit (e.g., TB/s). 🇫🇷 Performance d'E/S d'un système de stockage.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box"}, {"id": 74, "label": "Ubuntu", "title": "<b>Ubuntu   <i>Ubuntu</i> ", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot"}, {"id": 75, "label": "Visualization Node", "title": "<b>Visualization Node   <i>VisualizationNode</i>  🇬🇧 Dedicated visualization node with GPU, not deducted from allocation (e.g. jean-zay-visu at IDRIS). 🇫🇷 Nœud de visualisation dédié avec GPU, non décompté de l'allocation (ex : jean-zay-visu à l'IDRIS).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box"}, {"id": 76, "label": "allocated from quota", "title": "<b>allocated from quota   <i>allocatedFromQuota</i>  🇬🇧 Whether jobs on this partition are deducted from the user's compute allocation. False for prepost, visu.", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 77, "label": "architecture", "title": "<b>architecture   <i>architecture</i>  🇬🇧 Processor microarchitecture (e.g., 'Cascade Lake', 'Sapphire Rapids', 'Ampere', 'Hopper').", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 78, "label": "belongs to partition", "title": "<b>belongs to partition   <i>belongsToPartition</i> ", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 79, "label": "commissioning date", "title": "<b>commissioning date   <i>commissioningDate</i>  🇬🇧 Date when the system or generation became operational.", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 80, "label": "composed of", "title": "<b>composed of   <i>composedOf</i> ", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 81, "label": "connected via", "title": "<b>connected via   <i>connectedVia</i> ", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 82, "label": "contains", "title": "<b>contains   <i>contains</i>  🇬🇧 General containment relationship in HPC hierarchy.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 83, "label": "core count", "title": "<b>core count   <i>coreCount</i> ", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 84, "label": "decommissioning date", "title": "<b>decommissioning date   <i>decommissioningDate</i>  🇬🇧 Date when the system/partition/generation was retired.", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 85, "label": "default wall time", "title": "<b>default wall time   <i>defaultWallTime</i>  🇬🇧 Default wall time for jobs on this partition when not specified by the user.", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 86, "label": "description", "title": "<b>description   <i>description</i> ", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 87, "label": "documentation URL", "title": "<b>documentation URL   <i>documentationURL</i>  🇬🇧 URL of the official documentation page for this center, system or partition.", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 88, "label": "equipped with", "title": "<b>equipped with   <i>equippedWith</i>  🇬🇧 Indicates hardware components installed in a node.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 89, "label": "frontend node count", "title": "<b>frontend node count   <i>frontendNodeCount</i> ", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 90, "label": "funded by", "title": "<b>funded by   <i>fundedBy</i>  🇬🇧 Links a center or supercomputer to its funding agency.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 91, "label": "GPU count", "title": "<b>GPU count   <i>gpuCount</i>  🇬🇧 Number of GPUs per node (e.g., 4 for quad-GPU, 8 for octo-GPU).", "color": {"background": "#26A69A", "border": "#00796b"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 92, "label": "GPU memory", "title": "<b>GPU memory   <i>gpuMemory</i>  🇬🇧 Links GPU to its onboard HBM Memory capacity (e.g., V100 32GB HBM2). 🇫🇷 Relie GPU à sa mémoire HBM embarquée.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 93, "label": "has accelerator card", "title": "<b>has accelerator card   <i>hasAcceleratorCard</i>  🇬🇧 Links an accelerated compute node to its accelerator card(s).", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 94, "label": "has bandwidth", "title": "<b>has bandwidth   <i>hasBandwidth</i>  🇬🇧 Links interconnect to its data transfer rate. 🇫🇷 Relie interconnexion à son débit.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 95, "label": "has core", "title": "<b>has core   <i>hasCore</i>  🇬🇧 Links a processor (CPU or GPU) to its individual processing cores.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 96, "label": "has die size", "title": "<b>has die size   <i>hasDieSize</i>  🇬🇧 Links processor to its physical silicon die size (mm²). 🇫🇷 Relie le processeur à la dimension physique de sa puce silicium (mm²).", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 97, "label": "has frequency", "title": "<b>has frequency   <i>hasFrequency</i>  🇬🇧 Base clock frequency of a processor in GHz. Used in peak performance calculations (Rpeak = cores × frequency × FLOPs/cycle). 🇫🇷 Fréquence d'horloge de base d'un processeur en GHz. Utilisée dans le calcul de la performance crête (Rpeak = cœurs × fréquence × FLOPS/cycle).", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 98, "label": "has frontend nodes", "title": "<b>has frontend nodes   <i>hasFrontendNodes</i>  🇬🇧 Links a supercomputer to its login/frontend nodes used for SSH access, job submission and light compilation. Not counted in compute allocation. Typically 2–5 nodes per system. 🇫🇷 Lie un superordinateur à ses nœuds frontaux utilisés pour l'accès SSH, la soumission de tâches et la compilation légère. Non décomptés de l'allocation de calcul. Typiquement 2 à 5 nœuds par système.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 99, "label": "has generation", "title": "<b>has generation   <i>hasGeneration</i>  🇬🇧 Links a supercomputer to one of its hardware generations or extension phases.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 100, "label": "has lifetime", "title": "<b>has lifetime   <i>hasLifetime</i> ", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 101, "label": "has memory capacity", "title": "<b>has memory capacity   <i>hasMemoryCapacity</i>  🇬🇧 Links memory/storage device to its capacity. 🇫🇷 Relie mémoire/stockage à sa capacité.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 102, "label": "has partition", "title": "<b>has partition   <i>hasPartition</i>  🇬🇧 Links a supercomputer to one of its SLURM/job-scheduler partitions.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 103, "label": "has peak performance", "title": "<b>has peak performance   <i>hasPeakPerformance</i>  🇬🇧 Links supercomputer to its theoretical peak FLOPS (Rpeak). 🇫🇷 Relie superordinateur à sa performance théorique (Rpeak).", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 104, "label": "has power consumption", "title": "<b>has power consumption   <i>hasPowerConsumption</i>  🇬🇧 Electrical power consumption of a supercomputer, node or processor.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 105, "label": "has process node", "title": "<b>has process node   <i>hasProcessNode</i>  🇬🇧 Links processor to its manufacturing technology node. 🇫🇷 Relie le processeur à son nœud de fabrication.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 106, "label": "has QoS", "title": "<b>has QoS   <i>hasQoS</i>  🇬🇧 Links a partition to its Quality of Service classes, each defining a specific wall time limit, job priority and allocation deduction policy. 🇫🇷 Lie une partition à ses classes de Qualité de Service, chacune définissant un temps mur, une priorité et une politique de décompte d'allocation.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 107, "label": "has storage capacity", "title": "<b>has storage capacity   <i>hasStorageCapacity</i>  🇬🇧 Total storage capacity of a file system or mountpoint in TB or PB. On a StorageMount, represents the per-user or per-project quota when known. 🇫🇷 Capacité totale de stockage d'un système de fichiers ou d'un point de montage en To ou Po. Sur un StorageMount, représente le quota par utilisateur ou par projet lorsqu'il est connu.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 108, "label": "has storage mount", "title": "<b>has storage mount   <i>hasStorageMount</i>  🇬🇧 Links a supercomputer or HPC center to its user-accessible storage mountpoints (e.g. $HOME, $SCRATCH, $WORK, $STORE). 🇫🇷 Lie un superordinateur ou un centre HPC à ses points de montage accessibles aux utilisateurs (ex : $HOME, $SCRATCH, $WORK, $STORE).", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 109, "label": "has TDP", "title": "<b>has TDP   <i>hasTDP</i>  🇬🇧 Links processor to its manufacturer-specified TDP (Watts). e.g. NVIDIA A100 SXM4 -> 400W TDP, H100 SXM5 -> 700W TDP. 🇫🇷 Relie le processeur à son TDP spécifié par le fabricant (Watts). ex: NVIDIA A100 SXM4->TDP 400W, H100 SXM5->TDP 700W.", "color": {"background": "#5C6BC0", "border": "#3949ab"}, "font": {"color": "white"}, "shape": "ellipse"}, {"id": 110, "label": "has throughput", "title": "<b>has throughput   <i>hasThroughput</i>  🇬🇧 Aggregate I/O throughput of a file system in GB/s or TB/s. 🇫🇷 Débit d'E/S agrégé d'un système de fichiers       branchLegend.appendChild(div);
    }
  }
});

const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, options);

// ── Node click → inspector ──
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nid = params.nodes[0];
    const n = nodeData[nid];
    if (!n) return;

    // Parse tooltip back to structured info
    const titleHtml = n.title || '';
    document.getElementById('node-info').innerHTML = titleHtml
      .replace(/<b>(.*?)<\/b>/, '<div class="label">$1</div>')
      .replace(/<i>(.*?)<\/i>/, '<div class="uri">$1</div>')
      .replace(/🇬🇧 (.*?)(<br>|$)/g, '<div class="comment"><span class="lang-flag">🇬🇧 EN</span><br>$1</div>')
      .replace(/🇫🇷 (.*?)(<br>|$)/g, '<div class="comment"><span class="lang-flag">🇫🇷 FR</span><br>$1</div>');
  }
});

// ── Search ──
function searchNodes(query) {
  if (!query) {
    nodesDS.update(ALL_NODES.map(n => ({ id: n.id, opacity: 1, borderWidth: 1.5 })));
    return;
  }
  const q = query.toLowerCase();
  const updates = ALL_NODES.map(n => {
    const match = n.label.toLowerCase().includes(q) || (n.title || '').toLowerCase().includes(q);
    return { id: n.id, opacity: match ? 1 : 0.15, borderWidth: match ? 3 : 1 };
  });
  nodesDS.update(updates);
}

// ── Toggle edge types ──
function toggleEdge(btn) {
  const etype = btn.dataset.type;
  btn.classList.toggle('active');
  if (visibleTypes.has(etype)) {
    visibleTypes.delete(etype);
  } else {
    visibleTypes.add(etype);
  }
  edgesDS.clear();
  edgesDS.add(getVisibleEdges());
}

// ── Toggle physics ──
let physicsOn = true;
function togglePhysics(btn) {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
  btn.textContent = physicsOn ? '⚡ Physics ON' : '⚡ Physics OFF';
  btn.classList.toggle('active', physicsOn);
}
</script>
