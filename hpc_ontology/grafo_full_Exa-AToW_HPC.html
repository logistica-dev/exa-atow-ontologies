<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ontology Visualizer — Ontology — exaatow_hpc_ontology.ttl</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #e8f4f8; color: #1a1a2e; display: flex; flex-direction: column; height: 100vh; }

  #header { background: #c5dfe8; padding: 10px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid #a0c8d8; flex-shrink: 0; }
  #header h1 { font-size: 15px; color: #1a3a4a; white-space: nowrap; }

  #search { padding: 6px 12px; border-radius: 20px; border: 1px solid #a0c8d8; background: white; color: #1a1a2e; font-size: 13px; width: 220px; }
  #search:focus { outline: none; border-color: #2E86AB; }

  #controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .toggle-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .toggle-btn.active { background: #2E86AB; border-color: #2E86AB; color: white; }

  #main { display: flex; flex: 1; overflow: hidden; }
  #graph { flex: 1; background: #f0f8fb; }

  #sidebar { width: 280px; background: #daedf5; border-left: 1px solid #a0c8d8; padding: 16px; overflow-y: auto; flex-shrink: 0; font-size: 12px; color: #1a1a2e; }
  #sidebar h2 { font-size: 13px; color: #1a5f7a; margin-bottom: 12px; border-bottom: 1px solid #a0c8d8; padding-bottom: 6px; }
  #node-info { line-height: 1.6; }
  #node-info .label { font-size: 15px; font-weight: bold; color: #1a5f7a; margin-bottom: 4px; }
  #node-info .uri { font-size: 10px; color: #555; margin-bottom: 10px; word-break: break-all; }
  #node-info .comment { margin-top: 8px; padding: 8px; background: white; border-radius: 6px; line-height: 1.5; border: 1px solid #a0c8d8; }
  #node-info .lang-flag { font-size: 11px; color: #777; }

  #legend { margin-top: 16px; }
  #legend h3 { font-size: 11px; color: #1a5f7a; margin-bottom: 8px; }
  .leg-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: #1a1a2e; }
  .leg-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }

  #stats { margin-top: 16px; font-size: 11px; color: #555; line-height: 1.8; }
  
  #physics-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #a0c8d8; background: #daedf5; color: #1a3a4a; cursor: pointer; font-size: 11px; }
  #physics-btn.active { background: #26A69A; border-color: #26A69A; color: white; }

  .placeholder { color: #888; font-style: italic; font-size: 11px; margin-top: 20px; text-align: center; }
</style>
</head>
<body>

<div id="header">
  <h1>🔷 Ontology — exaatow_hpc_ontology.ttl</h1>
  <input id="search" type="text" placeholder="Search nodes…" oninput="searchNodes(this.value)">
  <select id="depth" onchange="searchNodes(document.getElementById('search').value)">
  <option value="1" selected>1 level</option>
  <option value="2">2 levels</option>
  <option value="3">3 levels</option>
  </select>
  <div id="controls">
    <span style="font-size:11px;color:#888">Show edges:</span>
    <button class="toggle-btn active" data-type="subClassOf" onclick="toggleEdge(this)">subClassOf</button>
    <button class="toggle-btn active" data-type="equivalentClass" onclick="toggleEdge(this)">equivalentClass</button>
    <button class="toggle-btn active" data-type="subPropertyOf" onclick="toggleEdge(this)">subPropertyOf</button>
    <button class="toggle-btn active" data-type="domain" onclick="toggleEdge(this)">domain</button>
    <button class="toggle-btn active" data-type="range" onclick="toggleEdge(this)">range</button>
    <button class="toggle-btn" data-type="inverseOf" onclick="toggleEdge(this)">inverseOf</button>
    <button class="toggle-btn active" data-type="type" onclick="toggleEdge(this)">rdf:type</button>
    <button class="toggle-btn active" data-type="restriction" onclick="toggleEdge(this)">restriction</button>
  </div>
  <button id="physics-btn" class="active" onclick="togglePhysics(this)">⚡ Physics ON</button>
  <button class="toggle-btn" onclick="network.fit()">⊞ Fit</button>
</div>

<div id="main">
  <div id="graph"></div>
  <div id="sidebar">
    <div id="legend">
      <h3>Legend — Node types</h3>
      <div id="branch-legend"></div>
      <div class="leg-item"><div class="leg-dot" style="background:#5C6BC0"></div>Object property</div>
      <div class="leg-item"><div class="leg-dot" style="background:#26A69A"></div>Datatype property</div>
      <div class="leg-item"><div class="leg-dot" style="background:#FF7043"></div>Instance</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1a3a4a"></div>Root class</div>
      <br>
      <h3>Legend — Edge types</h3>
      <div class="leg-item"><div class="leg-dot" style="background:#555;border-radius:0;height:3px;margin-top:5px"></div>subClassOf</div>
      <div class="leg-item"><div class="leg-dot" style="background:#E91E63;border-radius:0;height:2px;margin-top:5px"></div>equivalentClass</div>
      <div class="leg-item"><div class="leg-dot" style="background:#1565C0;border-radius:0;height:2px;margin-top:5px"></div>domain</div>
      <div class="leg-item"><div class="leg-dot" style="background:#2E7D32;border-radius:0;height:2px;margin-top:5px"></div>range</div>
      <div class="leg-item"><div class="leg-dot" style="background:#888;border-radius:0;height:2px;margin-top:5px;border-top:2px dotted #888"></div>rdf:type</div>
    </div>
    <h2>Node Inspector</h2>
    <div id="node-info">
      <div class="placeholder">Click any node to see its description</div>
    </div>
    <div id="stats">
      <b>Graph stats</b><br>
      Nodes: 170<br>
      Edges: 250<br>
      Mode: full
    </div>
  </div>
</div>

<script>
const ALL_NODES = [{"id": 0, "label": "AOCC", "title": "<b>AOCC   <i>AOCC</i>  🇬🇧 AMD Optimizing C/C++ and Fortran Compilers — required for Jean Zay A100 partition (gpu_p5, AMD EPYC nodes).", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 1, "label": "Accelerated Node", "title": "<b>Accelerated Node   <i>AcceleratedNode</i>  🇬🇧 A compute node equipped with one or more accelerator cards (GPUs or APUs). May also have a CPU (classic GPU nodes) or integrate CPU and GPU in the same package (APU nodes such as MI300A). 🇫🇷 Un nœud de calcul équipé à la fois de CPU et d'accélérateurs comme des GPU.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 2, "label": "Accelerator Card", "title": "<b>Accelerator Card   <i>AcceleratorCard</i>  🇬🇧 Physical card hosting one or more GPU/accelerator dies (e.g. NVIDIA A100 SXM4 80 GB). 🇫🇷 Carte physique hébergeant un ou plusieurs GPU/accélérateurs (ex : NVIDIA A100 SXM4 80 Go).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 3, "label": "Accelerator Card Component", "title": "<b>Accelerator Card Component   <i>AcceleratorCardComponent</i>  🇬🇧 A hardware component representing accelerator cards installed in a node. 🇫🇷 Un composant matériel représentant des cartes accélératrices installées dans un nœud.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 4, "label": "Bandwidth", "title": "<b>Bandwidth   <i>Bandwidth</i>  🇬🇧 Data transfer rate of an interconnect or memory bus (e.g. 200 Gb/s, 2 TB/s HBM3). 🇫🇷 Débit de transfert de données d'un interconnexion ou bus mémoire.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 5, "label": "CPU", "title": "<b>CPU   <i>CPU</i>  🇬🇧 The central processing unit responsible for executing general-purpose instructions. 🇫🇷 L'unité centrale de traitement responsable de l'exécution des instructions générales.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 6, "label": "CPU Component", "title": "<b>CPU Component   <i>CPUComponent</i>  🇬🇧 A hardware component representing CPUs installed in a node. 🇫🇷 Un composant matériel représentant des CPU installés dans un nœud.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 7, "label": "Compiler", "title": "<b>Compiler   <i>Compiler</i>  🇬🇧 Software tool for compiling source code (e.g., GCC, Intel oneAPI, NVCC, AOCC). 🇫🇷 Outil logiciel pour compiler le code source.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 8, "label": "Compute Node", "title": "<b>Compute Node   <i>ComputeNode</i>  🇬🇧 A physical or virtual machine in an HPC system that executes computational jobs. 🇫🇷 Une machine physique ou virtuelle dans un système HPC qui exécute des tâches de calcul.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 9, "label": "Cooling System", "title": "<b>Cooling System   <i>CoolingSystem</i>  🇬🇧 System maintaining temperature conditions of HPC components. 🇫🇷 Système maintenant les conditions de température des composants HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 10, "label": "Cray Compiler", "title": "<b>Cray Compiler   <i>CrayCC</i>  🇬🇧 HPE Cray Compiling Environment (CCE) for C, C++ and Fortran.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 11, "label": "Die Size", "title": "<b>Die Size   <i>DieSize</i>  🇬🇧 The physical area of the CPU or GPU die. Used in environmental impact estimation. 🇫🇷 Surface physique du die silicium d'un CPU ou GPU en mm². Utilisée pour l'estimation du carbone incorporé et des coûts de fabrication.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 12, "label": "Energy Management System", "title": "<b>Energy Management System   <i>EnergyManagement</i>  🇬🇧 Infrastructure and tools for monitoring, optimizing, and controlling power usage within the HPC environment. 🇫🇷 Infrastructure et outils pour surveiller, optimiser et contrôler la consommation d'énergie dans l'environnement HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 13, "label": "File System", "title": "<b>File System   <i>FileSystem</i>  🇬🇧 Shared storage infrastructure for I/O and checkpoint data in HPC environments. 🇫🇷 Infrastructure de stockage partagée utilisée pour les données d'entrée/sortie et les points de sauvegarde dans les environnements HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 14, "label": "Frequency", "title": "<b>Frequency   <i>Frequency</i>  🇬🇧 Clock frequency of a processor, including value and unit (e.g., GHz). 🇫🇷 Fréquence d'horloge d'un processeur (e.g., GHz.).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 15, "label": "Frontend Node", "title": "<b>Frontend Node   <i>FrontendNode</i>  🇬🇧 Login/frontend node for user access, job submission, and compilation. 🇫🇷 Nœud frontal pour l'accès utilisateur, la soumission de tâches et la compilation.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 16, "label": "Funding Agency", "title": "<b>Funding Agency   <i>FundingAgency</i>  🇬🇧 Agency funding HPC infrastructure (e.g. GENCI, ANR, European Commission, France 2030). 🇫🇷 Agence finançant l'infrastructure HPC (ex : GENCI, ANR, Commission européenne, France 2030).", "color": {"background": "#C62828", "border": "#7f0000"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 17, "label": "GCC", "title": "<b>GCC   <i>GCC</i>  🇬🇧 GNU Compiler Collection.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 18, "label": "GCD (Graphics Compute Die)", "title": "<b>GCD (Graphics Compute Die)   <i>GCD</i>  🇬🇧 Graphics Compute Die — one of the two independent compute dies on an AMD multi-chip-module accelerator card such as the MI250X. Each GCD has its own HBM stack and appears as a separate device to the OS/runtime. 🇫🇷 Graphics Compute Die — l'un des deux dies de calcul indépendants d'une carte accélératrice AMD multi-chip-module (ex : MI250X). Chaque GCD possède son propre empilement HBM et apparaît comme un dispositif distinct pour l'OS/runtime.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 19, "label": "GDDR Memory", "title": "<b>GDDR Memory   <i>GDDRMemory</i>  🇬🇧 Graphics DDR memory used on GPUs (e.g. GDDR6 on NVIDIA L40).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 20, "label": "GPFS / Spectrum Scale", "title": "<b>GPFS / Spectrum Scale   <i>GPFS</i>  🇬🇧 IBM General Parallel File System (Spectrum Scale), used at TGCC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 21, "label": "GPU", "title": "<b>GPU   <i>GPU</i>  🇬🇧 Graphics processing unit used to accelerate parallel computation tasks in HPC workloads. 🇫🇷 Un processeur graphique utilisé pour accélérer les tâches de calcul parallèle dans les charges de travail HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 22, "label": "HBM Memory", "title": "<b>HBM Memory   <i>HBMMemory</i>  🇬🇧 High Bandwidth Memory used on GPU accelerators (e.g. HBM2e on A100, HBM3 on H100). 🇫🇷 Mémoire haute bande passante utilisée sur les accélérateurs GPU (ex : HBM2e sur A100, HBM3 sur H100).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 23, "label": "HDD", "title": "<b>HDD   <i>HDD</i>  🇬🇧 A hard disk drive offering persistent storage, typically with higher capacity but lower I/O speed than SSDs. 🇫🇷 Un disque dur offrant un stockage persistant, généralement avec une plus grande capacité mais une vitesse d'E/S inférieure.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 24, "label": "HPC Center", "title": "<b>HPC Center   <i>HPCCenter</i>  🇬🇧 Institutional entity that operates and hosts one or more supercomputers. 🇫🇷 Entité institutionnelle qui exploite et héberge un ou plusieurs supercalculateurs.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 25, "label": "HPC Resource", "title": "<b>HPC Resource   <i>HPCResource</i>  🇬🇧 Root class for all physical, logical, and infrastructural resources involved in high-performance computing. 🇫🇷 Classe racine pour toutes les ressources physiques, logiques et infrastructurelles du calcul haute performance.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 26, "label": "Hardware Component", "title": "<b>Hardware Component   <i>HardwareComponent</i>  🇬🇧 A contextualized hardware element within a node, representing the usage of a hardware model with a given quantity. 🇫🇷 Un élément matériel contextualisé dans un nœud, représentant l’utilisation d’un modèle matériel avec une quantité donnée.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 27, "label": "Hardware Generation", "title": "<b>Hardware Generation   <i>HardwareGeneration</i>  🇬🇧 A discrete hardware generation or extension phase of a supercomputer (e.g. Jean Zay H100 extension, 2023). 🇫🇷 Génération matérielle ou phase d'extension d'un superordinateur (ex : extension H100 de Jean Zay).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 28, "label": "Hardware model", "title": "<b>Hardware model   <i>HardwareModel</i>  🇬🇧 Abstract description of a hardware device (CPU model, SSD model, NIC model). 🇫🇷 Description abstraite d’un composant matériel (modèle CPU, SSD, NIC).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 29, "label": "InfiniBand", "title": "<b>InfiniBand   <i>InfiniBand</i>  🇬🇧 InfiniBand high-speed network fabric (multiple generations: HDR 200 Gb/s, NDR 400 Gb/s).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 30, "label": "InfiniBand HDR", "title": "<b>InfiniBand HDR   <i>InfiniBandHDR</i>  🇬🇧 InfiniBand HDR (High Data Rate) - 200 Gb/s per port.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 31, "label": "InfiniBand NDR", "title": "<b>InfiniBand NDR   <i>InfiniBandNDR</i>  🇬🇧 InfiniBand NDR (Next Data Rate) - 400 Gb/s per port. Used in Jean Zay H100 partition (gpu_p6).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 32, "label": "Infrastructure", "title": "<b>Infrastructure   <i>Infrastructure</i>  🇬🇧 Facility-level support systems (cooling, power, energy management). 🇫🇷 Systèmes de support au niveau installation (refroidissement, alimentation, gestion de l'énergie).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 33, "label": "Intel Compiler", "title": "<b>Intel Compiler   <i>IntelCompiler</i>  🇬🇧 Intel oneAPI DPC++/C++ and Fortran Compilers.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 34, "label": "Intel Omni-Path", "title": "<b>Intel Omni-Path   <i>IntelOmniPath</i>  🇬🇧 Intel's high-performance interconnect technology (OPA - 100 Gb/s).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 35, "label": "Interconnect", "title": "<b>Interconnect   <i>Interconnect</i>  🇬🇧 High-speed network infrastructure enabling communication between compute nodes and system components. 🇫🇷 Infrastructure réseau à haute vitesse permettant la communication entre les nœuds de calcul et les composants du système.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 36, "label": "Interconnect Component", "title": "<b>Interconnect Component   <i>InterconnectComponent</i>  🇬🇧 A component representing network interfaces (NICs) connecting a node to the HPC interconnect. 🇫🇷 Un composant représentant les interfaces réseau (NICs) connectant un nœud à l'interconnexion HPC.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 37, "label": "LSF", "title": "<b>LSF   <i>LSF</i>  🇬🇧 Load Sharing Facility.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 38, "label": "Lifetime", "title": "<b>Lifetime   <i>Lifetime</i>  🇬🇧 Operational lifespan of a hardware component (years), such as a server or processor. 🇫🇷 Durée de vie opérationnelle d'un composant matériel (années).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 39, "label": "Linux", "title": "<b>Linux   <i>Linux</i> ", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 40, "label": "Logical Resource", "title": "<b>Logical Resource   <i>LogicalResource</i>  🇬🇧 Software-defined or abstract resource exposed to users or schedulers. 🇫🇷 Ressource définie par logiciel ou abstraite exposée aux utilisateurs ou aux ordonnanceurs.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 41, "label": "Lustre", "title": "<b>Lustre   <i>Lustre</i>  🇬🇧 Open-source parallel distributed file system, widely used in HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 42, "label": "Memory", "title": "<b>Memory   <i>Memory</i>  🇬🇧 Volatile memory components used during computation (DRAM, HBM, etc.). 🇫🇷 Composants de mémoire volatile utilisés pendant le calcul (DRAM, HBM, etc.).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 43, "label": "Memory Capacity", "title": "<b>Memory Capacity   <i>MemoryCapacity</i>  🇬🇧 Total amount of volatile data storage available in a computing component (e.g., RAM, HBM, VRAM). 🇫🇷 Quantité de données volatile qu'un dispositif de mémoire peut stocker (Go, To).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 44, "label": "Memory Component", "title": "<b>Memory Component   <i>MemoryComponent</i>  🇬🇧 A component representing system memory installed in a node. 🇫🇷 Un composant représentant la mémoire système installée dans un nœud.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 45, "label": "Module Environment", "title": "<b>Module Environment   <i>ModuleEnvironment</i>  🇬🇧 Software environment for dynamic module loading (e.g. Lmod, Environment Modules). 🇫🇷 Environnement logiciel pour le chargement dynamique de modules (ex : Lmod, Environment Modules).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 46, "label": "NVCC", "title": "<b>NVCC   <i>NVCC</i>  🇬🇧 NVIDIA CUDA Compiler.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 47, "label": "NVMe", "title": "<b>NVMe   <i>NVMe_SSD</i>  🇬🇧 NVMe-based solid state drive, typically used as local scratch on HPC nodes. 🇫🇷 Disque SSD NVMe, typiquement utilisé comme stockage scratch local sur les nœuds HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 48, "label": "Nominal Power", "title": "<b>Nominal Power   <i>NominalPower</i>  🇬🇧 Design-time power ceiling of a compute node or rack (Watts), typically the sum of component TDPs plus board and memory overhead. This is a static hardware specification, not a measured value. Published as input to PUE microservice. 🇫🇷 Puissance nominale de conception d'un nœud ou d'une baie (Watts), typiquement la somme des TDP des composants plus les surcharges carte et mémoire. Spécification statique, non une mesure. Publiée en entrée du microservice PUE.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 49, "label": "Operating System", "title": "<b>Operating System   <i>OperatingSystem</i>  🇬🇧 Operating system running on HPC nodes. 🇫🇷 Système d'exploitation exécuté sur les nœuds HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 50, "label": "Organization", "title": "<b>Organization   <i>Organization</i>  🇬🇧 Legal entity operating, owning, or funding HPC facilities. 🇫🇷 Entité légale qui exploite, possède ou finance des installations HPC.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 51, "label": "PBS", "title": "<b>PBS   <i>PBS</i>  🇬🇧 Portable Batch System — used at CEA/TGCC.", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 52, "label": "Parallel File System", "title": "<b>Parallel File System   <i>ParallelFileSystem</i>  🇬🇧 Distributed file system for parallel I/O operations. 🇫🇷 Système de fichiers distribué pour les opérations d'E/S parallèles à haut débit.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 53, "label": "Parallel Library", "title": "<b>Parallel Library   <i>ParallelLibrary</i>  🇬🇧 Parallel programming library or framework (e.g. OpenMPI, MPICH, CUDA, ROCm, OpenMP). 🇫🇷 Bibliothèque ou framework de programmation parallèle (ex : OpenMPI, CUDA, ROCm, OpenMP).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 54, "label": "Partition", "title": "<b>Partition   <i>Partition</i>  🇬🇧 Logical grouping of compute nodes within a supercomputer sharing hardware characteristics or workload type, mapped to a scheduler partition (SLURM, PBS). 🇫🇷 Regroupement logique de nœuds de calcul partageant des caractéristiques matérielles ou des types de charge de travail, associé à une partition d'ordonnanceur (SLURM, PBS).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 55, "label": "Peak Performance", "title": "<b>Peak Performance   <i>PeakPerformance</i>  🇬🇧 Theoretical peak performance (Rpeak) in FLOPS (e.g. TFLOPS, PFLOPS). 🇫🇷 Performance crête théorique (Rpeak) en FLOPS (ex : TFLOPS, PFLOPS).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 56, "label": "Performance Metric", "title": "<b>Performance Metric   <i>PerformanceMetric</i>  🇬🇧 Measure of computational performance. 🇫🇷 Mesure de la performance de calcul.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 57, "label": "Physical Resource", "title": "<b>Physical Resource   <i>PhysicalResource</i>  🇬🇧 Tangible hardware component of an HPC system. 🇫🇷 Composant matériel tangible d'un système HPC.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 58, "label": "Power Distribution Unit (PDU)", "title": "<b>Power Distribution Unit (PDU)   <i>PowerDistributionUnit</i>  🇬🇧 Hardware unit distributing electrical power to racks and nodes; its metered output feeds PUE calculations. 🇫🇷 Unité matérielle distribuant l'énergie électrique aux baies et nœuds ; sa mesure alimente les calculs de PUE.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 59, "label": "Pre/Post-processing Node", "title": "<b>Pre/Post-processing Node   <i>PrePostNode</i>  🇬🇧 Dedicated pre/post-processing node with large memory, not deducted from CPU/GPU allocation (e.g. jean-zay-pp at IDRIS). 🇫🇷 Nœud dédié au pré/post-traitement avec grande mémoire, non décompté de l'allocation (ex : jean-zay-pp à l'IDRIS).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 60, "label": "Process Node", "title": "<b>Process Node   <i>ProcessNode</i>  🇬🇧 [Semiconductor manufacturing] Specific generation of integrated circuit fabrication technology defined by the minimum feature size of transistors and interconnects, typically measured in nanometers (nm), where smaller nodes enable denser integration of components, higher performance, and reduced power consumption in devices such as microprocessors and memory chips. 🇫🇷 Nœud de procédé de fabrication de semiconducteurs en nm (ex : 7 nm, 4 nm). Corrélé à l'efficacité énergétique et à la taille de puce.", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 61, "label": "Processor", "title": "<b>Processor   <i>Processor</i>  🇬🇧 A general category for processing units, including CPUs and GPUs. 🇫🇷 Catégorie générale pour les unités de traitement, y compris les CPU et les GPU.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 62, "label": "Processor Component", "title": "<b>Processor Component   <i>ProcessorComponent</i>  🇬🇧 A hardware component representing one or more processors (CPU, GPU, APU) installed in a node. 🇫🇷 Un composant matériel représentant un ou plusieurs processeurs (CPU, GPU, APU) installés dans un nœud.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 63, "label": "Quality of Service (QoS)", "title": "<b>Quality of Service (QoS)   <i>QoS</i>  🇬🇧 Scheduler QoS class defining job time limits, priority, and resource caps for a partition (e.g. qos_gpu-t3). 🇫🇷 Classe QoS de l'ordonnanceur définissant les limites de temps, la priorité et les plafonds de ressources (ex : qos_gpu-t3).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 64, "label": "Quantitative Value", "title": "<b>Quantitative Value   <i>QuantitativeValue</i>  🇬🇧 A value with an associated unit of measurement. 🇫🇷 Valeur numérique avec une unité de mesure associée.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 65, "label": "RAM", "title": "<b>RAM   <i>RAM</i>  🇬🇧 Main volatile memory used by compute nodes for temporary data access during job execution (DRAM). 🇫🇷 Mémoire principale volatile utilisée par les nœuds de calcul (DRAM).", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 66, "label": "Rack", "title": "<b>Rack   <i>Rack</i>  🇬🇧 A physical chassis housing multiple compute nodes and infrastructure elements in a datacenter. 🇫🇷 Un châssis physique abritant plusieurs nœuds de calcul et éléments d'infrastructure dans un centre de données.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 67, "label": "Red Hat", "title": "<b>Red Hat   <i>RedHat</i> ", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 68, "label": "Resource Manager", "title": "<b>Resource Manager   <i>ResourceManager</i>  🇬🇧 Software system for job scheduling and resource allocation (e.g., SLURM, PBS, LSF). 🇫🇷 Système logiciel pour la planification des tâches et l'allocation des ressources.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 69, "label": "SAS SSD", "title": "<b>SAS SSD   <i>SAS_SSD</i>  🇬🇧 SAS-based solid state drive (Serial Attached SCSI), known for high reliability and endurance in server environments. 🇫🇷 Disque SSD SAS, reconnu pour sa haute fiabilité et son endurance dans les environnements serveurs.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 70, "label": "SLURM", "title": "<b>SLURM   <i>SLURM</i>  🇬🇧 Simple Linux Utility for Resource Management — the standard job scheduler at IDRIS (Jean Zay).", "color": {"background": "#FF7043", "border": "#bf360c"}, "font": {"color": "gray"}, "shape": "dot", "domain": [], "range": []}, {"id": 71, "label": "SSD", "title": "<b>SSD   <i>SSD</i>  🇬🇧 A solid-state drive offering high-speed persistent storage for jobs requiring fast I/O. 🇫🇷 Un disque SSD offrant un stockage persistant à haute vitesse pour les tâches nécessitant des E/S rapides.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 72, "label": "Scalar Node", "title": "<b>Scalar Node   <i>ScalarNode</i>  🇬🇧 A compute node equipped with general-purpose CPUs only (no accelerators). 🇫🇷 Un nœud de calcul équipé uniquement de processeurs généraux (CPU), sans accélérateurs.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 73, "label": "Server", "title": "<b>Server   <i>Server</i>  🇬🇧 A physical server housing processors, memory, and storage. 🇫🇷 Un serveur physique contenant des processeurs, de la mémoire et du stockage.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 74, "label": "HPE Cray Slingshot", "title": "<b>HPE Cray Slingshot   <i>Slingshot</i>  🇬🇧 HPE Cray Slingshot high-speed interconnect (200 Gb/s), used on HPE Cray EX systems.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 75, "label": "Software", "title": "<b>Software   <i>Software</i>  🇬🇧 General class for software used in HPC environments.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 76, "label": "Software Version", "title": "<b>Software Version   <i>SoftwareVersion</i>  🇬🇧 A specific version/installation of software on a system.", "color": {"background": "#1a3a4a", "border": "#000"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 77, "label": "Storage", "title": "<b>Storage   <i>Storage</i>  🇬🇧 Persistent storage devices and systems. 🇫🇷 Dispositifs et systèmes de stockage persistant.", "color": {"background": "#7B1FA2", "border": "#4a0072"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 78, "label": "Storage Capacity", "title": "<b>Storage Capacity   <i>StorageCapacity</i>  🇬🇧 Total amount of non-volatile, persistent data storage (e.g., SSD, HDD, Parallel File Systems). 🇫🇷 Capacité totale de stockage persistant (To, Po).", "color": {"background": "#F9A825", "border": "#f57f17"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 79, "label": "Storage Component", "title": "<b>Storage Component   <i>StorageComponent</i>  🇬🇧 A component representing storage devices (SSD, HDD) attached to a node. 🇫🇷 Un composant représentant les dispositifs de stockage (SSD, HDD) attachés à un nœud.", "color": {"background": "#2E86AB", "border": "#1a5f7a"}, "font": {"color": "white"}, "shape": "box", "domain": [], "range": []}, {"id": 80, "label": "Storage Mount", "title": "<b>Storage Mount   <i>Storag : {"size": 9, "color": "#444", "align": "middle"}, "smooth": {"type": "curvedCW", "roundness": 0.1}}, {"id": 249, "from": 44, "to": 42, "label": "refersToModel", "type": "restriction", "arrows": "to", "dashes": [2, 4], "color": {"color": "#00897B"}, "width": 2, "font": {"size": 9, "color": "#444", "align": "middle"}, "smooth": {"type": "curvedCW", "roundness": 0.1}}];

// Node data map for inspector
const nodeData = {};
ALL_NODES.forEach(n => { nodeData[n.id] = n; });

// Edge data
const edgeData = {};
ALL_EDGES.forEach(e => { edgeData[e.id] = e; });

// Visible edge types
const visibleTypes = new Set(['subClassOf', 'equivalentClass', 'subPropertyOf','domain', 'range', 'inverseOf', 'type', 'restriction']);

function getVisibleEdges() {
  return ALL_EDGES.filter(e => visibleTypes.has(e.type));
}

const nodesDS = new vis.DataSet(ALL_NODES);
const edgesDS = new vis.DataSet(getVisibleEdges());

const container = document.getElementById('graph');
const options = {
  physics: {
    enabled: true,
    solver: 'forceAtlas2Based',
    forceAtlas2Based: {
      gravitationalConstant: -80,
      centralGravity: 0.01,
      springLength: 120,
      springConstant: 0.08,
      damping: 0.4,
    },
    stabilization: { iterations: 200 },
  },
  interaction: {
    hover: true,
    tooltipDelay: 200,
    navigationButtons: true,
    keyboard: true,
  },
  edges: {
    font: { size: 9, color: '#aaa', strokeWidth: 0 },
    smooth: { type: 'curvedCW', roundness: 0.1 },
  },
  nodes: {
    borderWidth: 1.5,
    borderWidthSelected: 3,
    font: { size: 11 },
  },
};

// Build branch legend dynamically from node colors
const branchLegend = document.getElementById('branch-legend');
const seenColors = new Map();
ALL_NODES.forEach(function(n) {
  if (n.shape === 'box' && n.color.background !== '#1a3a4a') {
    var bg = n.color.background;
    if (!seenColors.has(bg)) {
      seenColors.set(bg, n.label);
      var div = document.createElement('div');
      div.className = 'leg-item';
      div.innerHTML = '<div class="leg-dot" style="background:' + bg + '"></div>' + n.label + ' branch';
      branchLegend.appendChild(div);
    }
  }
});

const network = new vis.Network(container, { nodes: nodesDS, edges: edgesDS }, options);

// ── Node click → inspector ──
network.on('click', function(params) {
  if (params.nodes.length > 0) {
    const nid = params.nodes[0];
    const n = nodeData[nid];
    if (!n) return;

    let html = '';

    // Base info (existing tooltip parsing)
    const titleHtml = n.title || '';
    html += titleHtml
      .replace(/<b>(.*?)<\/b>/, '<div class="label">$1</div>')
      .replace(/<i>(.*?)<\/i>/, '<div class="uri">$1</div>')
      .replace(/🇬🇧 (.*?)(<br>|$)/g, '<div class="comment"><span class="lang-flag">🇬🇧 EN</span><br>$1</div>')
      .replace(/🇫🇷 (.*?)(<br>|$)/g, '<div class="comment"><span class="lang-flag">🇫🇷 FR</span><br>$1</div>');

    // 🔥 NEW: domain → range for properties
    if (n.shape === 'ellipse') {
      const domain = (n.domain || []).join(', ') || '—';
      const range  = (n.range  || []).join(', ') || '—';

      html += `
         <br><i>Property linking:</i>
        <div class="comment">
          ${domain} → ${range}
        </div>
      `;
    }

    document.getElementById('node-info').innerHTML = html;
  }
});


// ── Search ──
function searchNodes(query) {
  const depth = parseInt(document.getElementById('depth').value || "1");

  if (!query) {
    nodesDS.clear();
    nodesDS.add(ALL_NODES);
    edgesDS.clear();
    edgesDS.add(getVisibleEdges());
    return;
  }

  const q = query.toLowerCase();

  // 1. Find matching nodes
  let currentLevel = new Set();
  ALL_NODES.forEach(n => {
    if (
      n.label.toLowerCase().includes(q) ||
      (n.title || '').toLowerCase().includes(q)
    ) {
      currentLevel.add(n.id);
    }
  });

  let visited = new Set(currentLevel);
  let allEdges = [];

  // 2. Expand N levels
  for (let d = 0; d < depth; d++) {
    let nextLevel = new Set();

    ALL_EDGES.forEach(e => {
      if (currentLevel.has(e.from) || currentLevel.has(e.to)) {
        allEdges.push(e);

        if (!visited.has(e.from)) {
          nextLevel.add(e.from);
          visited.add(e.from);
        }
        if (!visited.has(e.to)) {
          nextLevel.add(e.to);
          visited.add(e.to);
        }
      }
    });

    currentLevel = nextLevel;
  }

  // 3. Filter nodes
  const filteredNodes = ALL_NODES.filter(n => visited.has(n.id));

  // 4. Apply
  nodesDS.clear();
  nodesDS.add(filteredNodes);

  edgesDS.clear();
  edgesDS.add(allEdges.filter(e => visibleTypes.has(e.type)));
}



// ── Toggle edge types ──
function toggleEdge(btn) {
  const etype = btn.dataset.type;
  btn.classList.toggle('active');
  if (visibleTypes.has(etype)) {
    visibleTypes.delete(etype);
  } else {
    visibleTypes.add(etype);
  }
  edgesDS.clear();
  edgesDS.add(getVisibleEdges());
}

// ── Toggle physics ──
let physicsOn = true;
function togglePhysics(btn) {
  physicsOn = !physicsOn;
  network.setOptions({ physics: { enabled: physicsOn } });
  btn.textContent = physicsOn ? '⚡ Physics ON' : '⚡ Physics OFF';
  btn.classList.toggle('active', physicsOn);
}
