<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ontology Viewer (Dynamic TTL)</title>

<!-- vis.js -->

<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

<!-- N3 parser -->

<script src="https://unpkg.com/n3@1.17.2/browser/n3.min.js"></script>

<style>
  body { font-family: Arial; margin: 0; }
  #graph { width: 100vw; height: 100vh; }
</style>

</head>

<body>

<div id="graph"></div>

<script>

// 🔗 CAMBIA ESTA URL
const TTL_URL = "https://cnherrera.github.io/Exa-AToW_onto/hpc_ontology/exaatow_hpc_ontology.ttl";

async function loadTTL(url) {
  try {
    const res = await fetch(url);
    const ttl = await res.text();

    const parser = new N3.Parser();
    const triples = [];

    parser.parse(ttl, (error, quad, prefixes) => {
      if (error) {
        console.error(error);
        return;
      }

      if (quad) {
        triples.push(quad);
      } else {
        console.log("TTL cargado:", triples.length, "triples");
        buildGraph(triples);
      }
    });

  } catch (e) {
    console.error("Error cargando TTL:", e);
  }
}

// 🧠 Helpers
function shortName(uri) {
  if (!uri) return "";
  if (uri.includes("#")) return uri.split("#").pop();
  return uri.split("/").pop();
}

// 🔥 Construcción del grafo
function buildGraph(triples) {

  const nodes = new Map();
  const edges = [];

  triples.forEach(t => {
    const s = t.subject.value;
    const p = t.predicate.value;
    const o = t.object.value;

    // Crear nodo sujeto
    if (!nodes.has(s)) {
      nodes.set(s, {
        id: s,
        label: shortName(s)
      });
    }

    // Crear nodo objeto (solo URIs)
    if (o.startsWith("http") && !nodes.has(o)) {
      nodes.set(o, {
        id: o,
        label: shortName(o)
      });
    }

    // 🎯 Relaciones clave (puedes ampliar)
    if (p.includes("subClassOf")) {
      edges.push({ from: s, to: o, label: "subClassOf" });
    }

    if (p.includes("type")) {
      edges.push({ from: s, to: o, label: "type" });
    }

    if (p.includes("domain")) {
      edges.push({ from: s, to: o, label: "domain" });
    }

    if (p.includes("range")) {
      edges.push({ from: s, to: o, label: "range" });
    }

  });

  initGraph(Array.from(nodes.values()), edges);
}

// 🚀 vis.js
function initGraph(nodes, edges) {

  const container = document.getElementById("graph");

  const data = {
    nodes: new vis.DataSet(nodes),
    edges: new vis.DataSet(edges)
  };

  const options = {
    physics: {
      enabled: true
    },
    nodes: {
      shape: "dot",
      size: 10,
      font: { size: 12 }
    },
    edges: {
      arrows: "to",
      font: { size: 10 }
    }
  };

  new vis.Network(container, data, options);
}

// ▶️ Ejecutar
loadTTL(TTL_URL);

</script>

</body>
</html>
