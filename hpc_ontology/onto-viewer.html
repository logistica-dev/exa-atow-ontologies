<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OWL Ontology Visualizer — Cytoscape</title>

    <link rel="stylesheet" href="resources/style.css">

    <!-- N3.js for Turtle parsing -->
    <script src="https://unpkg.com/n3@1.17.2/browser/n3.min.js"></script>
    <!-- Dagre layout engine (must load before cytoscape-dagre) -->
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <!-- Cytoscape.js -->
    <script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
    <!-- Cytoscape dagre layout extension -->
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>

    
</head>

        </svg>
        OWL Visualizer
    </div>

        <span class="url-label">TTL&nbsp;URL&nbsp;:</span>
        <input
            type="text"
            id="ttlUrl"
            class="url-input"
	    value="https://cnherrera.github.io/Exa-AToW_onto/hpc_ontology/exaatow_hpc_ontology.ttl"
            spellcheck="false"
            autocomplete="off"
        />
        <label class="btn btn-secondary" title="Upload a local file">
            📂 File
            <input type="file" id="fileInput" accept=".ttl,.turtle,.rdf,.owl,.n3" style="display:none">
        </label>
        <button id="btnLoad" class="btn btn-primary">Upload →</button>
    </div>
</header>

<!-- ── Toolbar (hidden until ontology is loaded) ────────────────── -->
<div id="toolbar">
    <div class="tb-group">
        <span class="tb-label">Layout</span>
        <select id="layoutSelect">
            <option value="cose">Force-directed</option>            
            <option value="dagre-tb">Hierarchical (top → bottom)</option>
            <option value="dagre-lr">Hierarchical (left → right)</option>
            <option value="breadthfirst">Breadth-first</option>
            <option value="circle">Circle</option>
            <option value="grid">Grid</option>
        </select>
    </div>

    <div class="tb-group">
        <span class="tb-label">View</span>
        <button id="btnInstances"     class="toggle-btn on-rose">ABox (Instances)</button>
        <button id="btnTBox"      class="toggle-btn on-rose">TBox (Classes)</button>
        <button id="btnSubclass" class="toggle-btn on">subClassOf</button>
        <button id="btnProps"    class="toggle-btn on-gold">Object Properties</button>
        <button id="btnDatatypeProps" class="toggle-btn on-gold">Datatype Props</button>
    </div>

    <div class="tb-group">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Filter classes…">
        </div>
    </div>

    <div class="tb-group">
        <button id="btnFit"    class="icon-btn" title="Fit to screen">⊞ Fit</button>
        <button id="btnCenter" class="icon-btn" title="Reset view">↺ Reset</button>
    </div>

    <div class="stats-area" id="statsArea"></div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────── -->
<div class="main">

    <div id="cy">
        <!-- Welcome message -->
        <div id="welcome">
            <div class="welcome-icon">⬡</div>
            <div class="welcome-text">
                Type the URL of a TTL (Turtle/OWL) file<br>
                and click <strong>Upload</strong> to visualise the ontology.
            </div>
        </div>

        <!-- Loading overlay -->
        <div id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-msg" id="loadingMsg">Uploading...</div>
        </div>
    </div>

    <!-- Info panel -->
    <div class="info-panel">
        <div class="info-header">Node Details</div>
        <div class="info-body" id="infoBody">
            <div class="info-empty">Click on a node<br>to view its details.</div>
        </div>
    </div>

</div>

<!-- ── Status bar ───────────────────────────────────────────────── -->
<div class="statusbar">
    <span id="statusText">Waiting for a URL…</span>
    <div class="legend" id="legend">
        <div class="leg-item">
            <div class="leg-line-solid"></div>
            <span>subClassOf</span>
        </div>
        <div class="leg-item">

            <span>Instance</span>
        </div>
        <div class="leg-item">
            <div style="width: 12px; height: 12px; background: #a7f3d0; opacity: 0.3; border: 1px solid #059669; transform: rotate(45deg); display: inline-block; margin-right: 6px;"></div>
            <span>Datatype</span>

    </div>
</div>

<!-- ══════════════════════════════════════════════════════════════ -->
<!--                        JAVASCRIPT                            -->
<!-- ══════════════════════════════════════════════════════════════ -->
<script>
'use strict';

const DEBUG = true;
// ─────────────────────────────────────────────────────────────────
// RDF constants
// ─────────────────────────────────────────────────────────────────
const OWL  = 'http://www.w3.org/2002/07/owl#';
const RDF  = 'http://www.w3.org/1999/02/22-rdf-syntax-ns#';
const RDFS = 'http://www.w3.org/2000/01/rdf-schema#';
const SKOS = 'http://www.w3.org/2004/02/skos/core#';

// ─────────────────────────────────────────────────────────────────
// Colour palette (one per top-level branch)
// ─────────────────────────────────────────────────────────────────
const PALETTE = [
    '#818cf8', // indigo
    '#34d399', // emerald
    '#f87171', // red-400
    '#60a5fa', // blue-400
    '#fbbf24', // amber-400
    '#a78bfa', // violet-400
    '#2dd4bf', // teal-400
    '#fb923c', // orange-400
    '#f472b6', // pink-400
    '#4ade80', // green-400
    '#e879f9', // fuchsia-400
    '#67e8f9', // cyan-300
];

// ─────────────────────────────────────────────────────────────────
// Tiny utilities
// ─────────────────────────────────────────────────────────────────
function localName(uri) {
    const h = uri.lastIndexOf('#');
    const s = uri.lastIndexOf('/');
    const i = Math.max(h, s);
    return i >= 0 ? uri.substring(i + 1) : uri;
}

function esc(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

function setLoading(on, msg = 'Uploading...') {
    const el = document.getElementById('loadingOverlay');
    document.getElementById('loadingMsg').textContent = msg;
    el.classList.toggle('visible', on);
}

function setStatus(text) {
    document.getElementById('statusText').textContent = text;
}

let toastTimer = null;
function showToast(msg, ms = 5000) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('visible'), ms);
}

function linkify(text) {
    const urlRegex = /(https?:\/\/[^\s]+|www\.[^\s]+)/g;

    return text.replace(urlRegex, (url) => {
        let href = url;
        if (!href.startsWith('http')) {
            href = 'https://' + href;
        }
        return `<a href="${href}" target="_blank" rel="noopener noreferrer">${url}</a>`;
    });
}

// ─────────────────────────────────────────────────────────────────
// Parse an RDF list starting at `listNode`
// ─────────────────────────────────────────────────────────────────
function extractRDFList(store, listNode) {
    const members = [];
    let cur = listNode;
    const nilURI = RDF + 'nil';
    const visited = new Set();

    while (cur && cur.termType !== 'DefaultGraph' && !visited.has(cur.value)) {
        if (cur.value === nilURI) break;
        visited.add(cur.value);

        const firstQuads = store.getQuads(cur, RDF + 'first', null, null);
        if (firstQuads.length === 0) break;
        members.push(firstQuads[0].object);

        const restQuads = store.getQuads(cur, RDF + 'rest', null, null);
        if (restQuads.length === 0) break;
        cur = restQuads[0].object;
    }
    return members;
}

// Resolve possible owl:unionOf blank node → list of named URIs
function resolveClassNode(store, node) {
    if (node.termType === 'NamedNode') return [node.value];
    if (node.termType !== 'BlankNode') return [];

    const unionOf = store.getQuads(node, OWL + 'unionOf', null, null);
    if (unionOf.length > 0) {
        return extractRDFList(store, unionOf[0].object)
            .filter(t => t.termType === 'NamedNode')
            .map(t => t.value);
    }
    const intersectionOf = store.getQuads(node, OWL + 'intersectionOf', null, null);
    if (intersectionOf.length > 0) {
        return extractRDFList(store, intersectionOf[0].object)
            .filter(t => t.termType === 'NamedNode')
            .map(t => t.value);
    }
    return [];
}

// ─────────────────────────────────────────────────────────────────
// Parse TTL asynchronously using N3.js callback API
// ─────────────────────────────────────────────────────────────────
function parseTTL(text) {
    return new Promise((resolve, reject) => {
        const parser = new N3.Parser({ format: 'text/turtle' });
        const quads = [];
        parser.parse(text, (err, quad) => {
            if (err)  return reject(new Error('Parsing TTL : ' + err.message));
            if (quad) quads.push(quad);
            else      resolve(quads);   // null quad = done
        });
    });
}

function isSystemUri(uri) {
    const systemNamespaces = [
        'http://www.w3.org/1999/02/22-rdf-syntax-ns#',
        'http://www.w3.org/2000/01/rdf-schema#',
        'http://www.w3.org/2002/07/owl#',
        'http://www.w3.org/2001/XMLSchema#'
    ];
    return systemNamespaces.some(ns => uri.startsWith(ns));
}
// ─────────────────────────────────────────────────────────────────
// Extract ontology data from an N3.Store
// ─────────────────────────────────────────────────────────────────
function extractOntology(store) {
    // ── 1. Collect classes ────────────────────────────────────
    const classes = new Map(); // uri → { uri, label, comment }

    function registerClass(uri) {
        if (!uri || uri.startsWith('_:')) return;
        if (!classes.has(uri)) {
            classes.set(uri, { uri, label: localName(uri), comment: '' });
        }
    }

    for (const ct of [OWL + 'Class', RDFS + 'Class']) {
        for (const q of store.getQuads(null, RDF + 'type', ct, null)) {
            if (q.subject.termType !== 'NamedNode') continue;
            registerClass(q.subject.value);
        }
    }

    // Also pick up classes referenced only via rdfs:subClassOf
    for (const q of store.getQuads(null, RDFS + 'subClassOf', null, null)) {
        if (q.subject.termType === 'NamedNode') registerClass(q.subject.value);
        if (q.object.termType  === 'NamedNode') registerClass(q.object.value);
    }

    // ── 2. Labels ─────────────────────────────────────────────
    // Priority: skos:prefLabel@en > rdfs:label@en > skos:prefLabel (any) > rdfs:label (any)
    const labelPriority = new Map(); // uri → priority (lower = better)

    function trySetLabel(uri, val, lang, priority) {
        const cls = classes.get(uri);
        if (!cls) return;
        const cur = labelPriority.get(uri) ?? 99;
        if (priority < cur) {
            cls.label = val;
            labelPriority.set(uri, priority);
        }
    }

    for (const q of store.getQuads(null, SKOS + 'prefLabel', null, null)) {
        const uri = q.subject.value;
        const lang = q.object.language || '';
        if (lang === 'en') trySetLabel(uri, q.object.value, lang, 0);
        else               trySetLabel(uri, q.object.value, lang, 2);
    }
    for (const q of store.getQuads(null, RDFS + 'label', null, null)) {
        const uri = q.subject.value;
        const lang = q.object.language || '';
        if (lang === 'en') trySetLabel(uri, q.object.value, lang, 1);
        else               trySetLabel(uri, q.object.value, lang, 3);
    }

    // ── 3. Comments ───────────────────────────────────────────
    for (const cp of [RDFS + 'comment', SKOS + 'definition', SKOS + 'scopeNote']) {
        for (const q of store.getQuads(null, cp, null, null)) {
            const cls = classes.get(q.subject.value);
            if (!cls || cls.comment) continue;
            if (q.object.language === 'en' || !q.object.language) {
                cls.comment = q.object.value;
            }
        }
    }
    // Fallback: FR comments if no EN found
    for (const cp of [RDFS + 'comment', SKOS + 'definition']) {
        for (const q of store.getQuads(null, cp, null, null)) {
            const cls = classes.get(q.subject.value);
            if (!cls || cls.comment) continue;
            cls.comment = q.object.value;
        }
    }

    // ── 4. subClassOf edges (named classes only) ──────────────
    const subClassEdges = [];

    for (const q of store.getQuads(null, RDFS + 'subClassOf', null, null)) {
        if (q.subject.termType !== 'NamedNode') continue;
        if (q.object.termType  !== 'NamedNode') continue;
        const from = q.subject.value;
        const to   = q.object.value;
        if (classes.has(from) && classes.has(to) && from !== to) {
            subClassEdges.push({ from, to });
        }
    }

    // ── 5. Object properties ──────────────────────────────────
    const properties = new Map(); // uri → { uri, label, domains:[], ranges:[] }

    for (const q of store.getQuads(null, RDF + 'type', OWL + 'ObjectProperty', null)) {
        if (q.subject.termType !== 'NamedNode') continue;
        const uri = q.subject.value;
        if (!properties.has(uri)) {
            properties.set(uri, { uri, label: localName(uri), domains: [], ranges: [] });
        }
    }

    // Property labels
    for (const lp of [SKOS + 'prefLabel', RDFS + 'label']) {
        for (const q of store.getQuads(null, lp, null, null)) {
            const prop = properties.get(q.subject.value);
            if (!prop) continue;
            if (q.object.language === 'en') prop.label = q.object.value;
        }
    }

    // Domains & ranges (including owl:unionOf blank nodes)
    for (const q of store.getQuads(null, RDFS + 'domain', null, null)) {
        const prop = properties.get(q.subject.value);
        if (!prop) continue;
        for (const uri of resolveClassNode(store, q.object)) {
            if (classes.has(uri) && !prop.domains.includes(uri)) prop.domains.push(uri);
        }
    }
    for (const q of store.getQuads(null, RDFS + 'range', null, null)) {
        const prop = properties.get(q.subject.value);
        if (!prop) continue;
        for (const uri of resolveClassNode(store, q.object)) {
            if (classes.has(uri) && !prop.ranges.includes(uri)) prop.ranges.push(uri);
        }
    }

    // ── 6. Datatype properties ────────────────────────────────────
    const datatypeProperties = new Map(); // uri → { uri, label, domains:[], datatypes:[] }

    for (const q of store.getQuads(null, RDF + 'type', OWL + 'DatatypeProperty', null)) {
        if (q.subject.termType !== 'NamedNode') continue;
        const uri = q.subject.value;
        if (!datatypeProperties.has(uri)) {
            datatypeProperties.set(uri, { uri, label: localName(uri), domains: [], datatypes: [] });
        }
    }

    // Datatype property labels
    for (const lp of [SKOS + 'prefLabel', RDFS + 'label']) {
        for (const q of store.getQuads(null, lp, null, null)) {
            const prop = datatypeProperties.get(q.subject.value);
            if (!prop) continue;
            if (q.object.language === 'en') prop.label = q.object.value;
        }
    }

    // Domains for datatype properties
    for (const q of store.getQuads(null, RDFS + 'domain', null, null)) {
        const prop = datatypeProperties.get(q.subject.value);
        if (!prop) continue;
        for (const uri of resolveClassNode(store, q.object)) {
            if (classes.has(uri) && !prop.domains.includes(uri)) prop.domains.push(uri);
        }
    }

    // Ranges for datatype properties (typically XML Schema types)
    for (const q of store.getQuads(null, RDFS + 'range', null, null)) {
        const prop = datatypeProperties.get(q.subject.value);
        if (!prop) continue;
        if (q.object.termType === 'NamedNode') {
            if (!prop.datatypes.includes(q.object.value)) prop.datatypes.push(q.object.value);
        }
    }

    // ── 7. Instances (individuos/instancias) ──────────────────────
    const instances = new Map(); // uri → { uri, label, type, comment }

    for (const q of store.getQuads(null, RDF + 'type', null, null)) {
        //if (q.subject.termType !== 'NamedNode') continue;
        //if (q.object.termType !== 'NamedNode') continue;

        if (q.subject.termType === 'BlankNode') continue; // Ignoramos el bnode como sujeto principal aquí
              
        const instUri = q.subject.value;
        const typeUri = q.object.value;

        if (isSystemUri(instUri)) continue;

        if (typeUri === OWL + 'Ontology' || typeUri === OWL + 'AnnotationProperty' || typeUri === OWL + 'Class' ) continue;
        if (typeUri === OWL + 'DatatypeProperty' || typeUri === OWL + 'ObjectProperty' ) continue;
    
        
        // Solo consideramos instancias de clases que hemos identificado
        // it doesnt work when i upload only Abox.
        // Just try getting all. Maybe I should "import" the entire ontology.
        //if (classes.has(typeUri) && !instUri.startsWith('_:')) {
        if (!instUri.startsWith('_:')) {
            if (!instances.has(instUri)) {
                instances.set(instUri, { uri: instUri, label: localName(instUri), type: typeUri, comment: '' });
            }
        }
        // Para añadir atributos.
        const inst = instances.get(q.subject.value);
        if (inst && !inst.attributes) inst.attributes = []; // Inicializamos un array de atributos
    }

    // Instance labels
    for (const lp of [SKOS + 'prefLabel', RDFS + 'label']) {
        for (const q of store.getQuads(null, lp, null, null)) {
            const inst = instances.get(q.subject.value);
            if (!inst) continue;
            if (q.object.language === 'en') inst.label = q.object.value;
        }
    }

    // Instance comments
    for (const cp of [RDFS + 'comment', SKOS + 'definition']) {
        for (const q of store.getQuads(null, cp, null, null)) {
            const inst = instances.get(q.subject.value);
            if (!inst || inst.comment) continue;
            if (q.object.language === 'en' || !q.object.language) {
                inst.comment = q.object.value;
            }
        }
    }

    // 
    // NUEVO: Capturar todos los Literales para el panel de detalles
    for (const q of store.getQuads(null, null, null, null)) {
        if (q.object.termType === 'Literal') {
            const inst = instances.get(q.subject.value);
            if (inst) {
                inst.attributes.push({
                    prop: localName(q.predicate.value),
                    value: q.object.value
                });
            }
        }
        // EXTRA: Capturar valores dentro de BNodes (como MemoryCapacity hasValue "24")
        if (q.subject.termType === 'BlankNode' && q.object.termType === 'Literal') {
            // Buscamos quién apunta a este BNode
            const parents = store.getQuads(null, null, q.subject, null);
            for (const p of parents) {
                const parentInst = instances.get(p.subject.value);
                if (parentInst) {
                    parentInst.attributes.push({
                        prop: localName(p.predicate.value) + " → " + localName(q.predicate.value),
                        value: q.object.value
                    });
                }
            }
        }
    }


    // ── 8. Nodes literal ──────────────────────//
    const literalNodes = [];
    const datatypeEdges = [];

    for (const [pUri, prop] of datatypeProperties) {
        const quads = store.getQuads(null, pUri, null, null);

	    for (const q of quads) {
            const s = q.subject;
            const o = q.object;

            if (s.termType !== 'NamedNode') continue;
            if (o.termType !== 'Literal') continue;

            const sUri = s.value;
            if (!instances.has(sUri)) continue;

            const literalId = sUri + '_' + pUri + '_' + o.value;

            literalNodes.push({
		        id: literalId,
		        label: o.value,
		        type: 'literal'
            });

            datatypeEdges.push({
		        from: sUri,
		        to: literalId,
		        label: prop.label
            });
	    }
    }

    // Instances edges
    // Instances → Instance edges (con salto de Blank Nodes mejorado)
    const instancesEdges = [];
    for (const [pUri, prop] of properties) {
        const quads = store.getQuads(null, pUri, null, null);
        for (const q of quads) {
            if (q.subject.termType !== 'NamedNode' || !instances.has(q.subject.value)) continue;

            // CASO A: Link directo
            if (q.object.termType === 'NamedNode' && instances.has(q.object.value)) {
                instancesEdges.push({ from: q.subject.value, to: q.object.value, label: prop.label, uri: pUri });
            } 
            // CASO B: Link vía BNode (Ej: hasAcceleratorCardComponent -> [] -> refersToModel -> Instancia)
            else if (q.object.termType === 'BlankNode') {
                // Buscamos dentro del BNode cualquier cosa que apunte a una instancia conocida
                const subQuads = store.getQuads(q.object, null, null, null);
                for (const sq of subQuads) {
                    if (sq.object.termType === 'NamedNode' && instances.has(sq.object.value)) {
                        instancesEdges.push({
                            from: q.subject.value,
                            to: sq.object.value,
                            // Combinamos nombres para que el usuario entienda el link
                            label: prop.label + " (" + localName(sq.predicate.value) + ")",
                            uri: pUri
                        });
                    }
                }
            }
        }
    }

    return { classes, subClassEdges, properties, datatypeProperties, instances, instancesEdges };
    //, literalNodes, };
}

// ─────────────────────────────────────────────────────────────────
// Assign branch colours via BFS from roots
// ─────────────────────────────────────────────────────────────────
function assignColors(classes, subClassEdges) {
    const children  = new Map();  // parent → [child]
    const hasParent = new Set();

    for (const { from, to } of subClassEdges) {
        if (!children.has(to)) children.set(to, []);
        children.get(to).push(from);
        hasParent.add(from);
    }

    const roots = [...classes.keys()].filter(u => !hasParent.has(u));
    const colorMap = new Map();
    let ci = 0;

    function propagate(uri, color) {
        colorMap.set(uri, color);
        for (const child of (children.get(uri) || [])) {
            propagate(child, color);
        }
    }

    for (const root of roots) {
        propagate(root, PALETTE[ci++ % PALETTE.length]);
    }

    for (const uri of classes.keys()) {
        if (!colorMap.has(uri)) colorMap.set(uri, '#94a3b8');
    }

    return colorMap;
}

// ─────────────────────────────────────────────────────────────────
// Build Cytoscape element array
// ─────────────────────────────────────────────────────────────────
function buildElements(ontology) {
    const { classes, subClassEdges, properties, datatypeProperties, instances, instancesEdges } = ontology;
    //,instancesEdges literalNodes, datatypeEdges } = ontology;
    const colorMap = assignColors(classes, subClassEdges);
    const elements = [];

    // Nodes - Classes
    for (const [uri, cls] of classes) {
        elements.push({
            data: {
                id:        uri,
                label:     cls.label,
                comment:   cls.comment,
                uri:       uri,
                nodeColor: colorMap.get(uri) || '#94a3b8',
                type:      'class'
            }
        });
    }

    // Nodes - Instances
    for (const [uri, inst] of instances) {
        const classNode = classes.get(inst.type); // Obtén el objeto de la clase
        elements.push({
            data: {
                id:      uri,
                label:   inst.label,
                comment: inst.comment,
                attributes: inst.attributes,
                uri:     uri,
                type:    'instance',
                classType: inst.type,
                classColor: classNode ? classNode.color : '#ec4899' // <--- Guardamos el color aquí
            }
        });
    }


    // subClassOf edges
    let eIdx = 0;
    const seenSub = new Set();
    for (const { from, to } of subClassEdges) {//
        const key = from + '|' + to;
        if (seenSub.has(key)) continue;
        seenSub.add(key);
        elements.push({
            data: {
                id:       'sub_' + eIdx++,
                source:   from,
                target:   to,
                label:    '',
                edgeType: 'subClassOf'
            }
        });
    }

    // Object property edges
    let pIdx = 0;
    const seenProp = new Set();
    for (const [uri, prop] of properties) {
        const doms = prop.domains.filter(d => classes.has(d));
        const rngs = prop.ranges.filter(r => classes.has(r));
        if (!doms.length || !rngs.length) continue;
        for (const d of doms) {
            for (const r of rngs) {
                const key = d + '→' + r + '→' + prop.label;
                if (seenProp.has(key)) continue;
                seenProp.add(key);
                elements.push({
                    data: {
                        id:       'prop_' + pIdx++,
                        source:   d,
                        target:   r,
                        label:    prop.label,
                        edgeType: 'objectProperty',
                        propUri:  uri
                    }
                });
            }
        }
    }

    // Datatype property edges
    let dtIdx = 0;
    const seenDT = new Set();
    for (const [uri, dtProp] of datatypeProperties) {
        const doms = dtProp.domains.filter(d => classes.has(d));
        if (!doms.length || !dtProp.datatypes.length) continue;
        for (const d of doms) {
            for (const dt of dtProp.datatypes) {
                const key = d + '→' + dt + '→' + dtProp.label;
                if (seenDT.has(key)) continue;
                seenDT.add(key);
                // Crear un pseudo-nodo para el tipo de dato si no existe
                const dtNodeId = 'datatype_' + localName(dt);
                if (!elements.some(e => e.data && e.data.id === dtNodeId)) {
                    elements.push({
                        data: {
                            id:   dtNodeId,
                            label: localName(dt),
                            type:  'datatype',
                            uri:   dt
                        }
                    });
                }
                elements.push({
                    data: {
                        id:       'dtprop_' + dtIdx++,
                        source:   d,
                        target:   dtNodeId,
                        label:    dtProp.label,
                        edgeType: 'datatypeProperty',
                        propUri:  uri
                    }
                });
            }
        }
    }

    // Instance type edges (rdf:type)
    let instIdx = 0;
    const seenInst = new Set();
    for (const [uri, inst] of instances) {
        const key = uri + '|' + inst.type;
        if (seenInst.has(key)) continue;
        seenInst.add(key);
        elements.push({
            data: {
                id:       'inst_' + instIdx++,
                source:   uri,
                target:   inst.type,
                label:    'rdf:type',
                edgeType: 'instanceOf'
            }
        });
    }
    
    // Instance → Instance edges (object properties)
    let ieIdx = 0;
    const seenIE = new Set();

    if (instancesEdges) {
	for (const e of instancesEdges) {
            const key = e.from + '|' + e.uri + '|' + e.to;
            if (seenIE.has(key)) continue;
            seenIE.add(key);
            elements.push({
     		    data: {
                     id:       'instrel_' + ieIdx++,
                     source:   e.from,
                     target:   e.to,
                     label:    e.label,
                     edgeType: 'instanceRelation',
                     propUri:  e.uri
     		    }
            });
     	}
    }

    return { elements, colorMap };
}

// ─────────────────────────────────────────────────────────────────
// Highlight clicked node + neighbours
// ─────────────────────────────────────────────────────────────────
function highlightNode(node) {
    if (!cy) return;
    cy.batch(() => {
        cy.elements().addClass('dim').removeClass('hl');
        node.addClass('hl').removeClass('dim');
        const edges = node.connectedEdges(':visible');
        edges.addClass('hl').removeClass('dim');
        edges.connectedNodes().addClass('hl').removeClass('dim');
    });
}

// ─────────────────────────────────────────────────────────────────
// Info panel
// ─────────────────────────────────────────────────────────────────
function formatAttributeValue(val) {
    // Verificamos si es una URL simple
    if (typeof val === 'string' && (val.startsWith('http://') || val.startsWith('https://'))) {
        return `<a href="${val}" target="_blank" style="color:#2563eb; text-decoration:underline;">${val}</a>`;
    }
    // Si no es URL, lo devolvemos tal cual (escapado por seguridad)
    return esc(val);
}

function renderInfoPanel(node) {
    if (!parsedData) return;
    const uri = node.id();
    const nodeType = node.data('type');
    
    let html = '';

    // Handle Classes
    if (nodeType === 'class') {
        const cls = parsedData.classes.get(uri);
        if (!cls) return;

        const col   = node.data('nodeColor');
        const edges = node.connectedEdges(':visible');

        const superNodes = edges
            .filter(e => e.data('edgeType') === 'subClassOf' && e.source().id() === uri)
            .map(e => e.target());

        const subNodes = edges
            .filter(e => e.data('edgeType') === 'subClassOf' && e.target().id() === uri)
            .map(e => e.source());

        const outProps = edges
            .filter(e => e.data('edgeType') === 'objectProperty' && e.source().id() === uri);

        const inProps = edges
            .filter(e => e.data('edgeType') === 'objectProperty' && e.target().id() === uri);

        const outDTProps = edges
            .filter(e => e.data('edgeType') === 'datatypeProperty' && e.source().id() === uri);

        const instances = edges
            .filter(e => e.data('edgeType') === 'instanceOf' && e.target().id() === uri)
            .map(e => e.source());

        html = `
            <div class="node-name" style="color:${col}">${esc(cls.label)}</div>
            <div class="node-uri">${linkify(esc(uri))}</div>
        `;

        if (cls.comment) {
            const short = cls.comment.length > 320
                ? cls.comment.substring(0, 320) + '…'
                : cls.comment;
            html += `<div class="node-comment">${esc(short)}</div>`;
        }

        if (superNodes.length > 0) {
            html += `<div class="section-title">▲ Superclasses (${superNodes.length})</div>`;
            superNodes.forEach(n => {
                const c = n.data('nodeColor');
                html += `<span class="pill"
                    style="background:${c}1a;color:${c};border-color:${c}40"
                    data-nid="${esc(n.id())}">${esc(n.data('label'))}</span>`;
            });
        }

        if (subNodes.length > 0) {
            html += `<div class="section-title">▼ Subclasses (${subNodes.length})</div>`;
            subNodes.forEach(n => {
                const c = n.data('nodeColor');
                html += `<span class="pill"
                    style="background:${c}1a;color:${c};border-color:${c}40"
                    data-nid="${esc(n.id())}">${esc(n.data('label'))}</span>`;
            });
        }

        if (outProps.length > 0) {
            html += `<div class="section-title">→ Outgoing Object Properties (${outProps.length})</div>`;
            outProps.forEach(e => {
                const tgt = e.target();
                html += `<div class="prop-row">
                    <span class="prop-name">${esc(e.data('label'))}</span>
                    <span class="prop-arr">→</span>
                    <span class="prop-target" data-nid="${esc(tgt.id())}">${esc(tgt.data('label'))}</span>
                </div>`;
            });
        }

        if (inProps.length > 0) {
            html += `<div class="section-title">← Incoming Object Properties (${inProps.length})</div>`;
            inProps.forEach(e => {
                const src = e.source();
                html += `<div class="prop-row">
                    <span class="prop-target" data-nid="${esc(src.id())}">${esc(src.data('label'))}</span>
                    <span class="prop-arr">→</span>
                    <span class="prop-name">${esc(e.data('label'))}</span>
                </div>`;
            });
        }

        if (outDTProps.length > 0) {
            html += `<div class="section-title">⟿ Data Properties (${outDTProps.length})</div>`;
            outDTProps.forEach(e => {
                const tgt = e.target();
                html += `<div class="prop-row">
                    <span class="prop-name">${esc(e.data('label'))}</span>
                    <span class="prop-arr">→</span>
                    <span class="prop-target">${esc(tgt.data('label'))}</span>
                </div>`;
            });
        }

        if (instances.length > 0) {
            html += `<div class="section-title">▪ Instances (${instances.length})</div>`;
            instances.forEach(n => {
                html += `<span class="pill"
                    style="background:#ec489933;color:#be185d;border-color:#ec489955"
                    data-nid="${esc(n.id())}">${esc(n.data('label'))}</span>`;
            });
        }
    }
    // Handle Instances
    else if (nodeType === 'instance') {
        const inst = parsedData.instances.get(uri);
        if (!inst) return;

        const classNode = cy.getElementById(inst.type);
        const col = classNode.length ? classNode.data('nodeColor') : '#94a3b8';

        html = `
            <div class="node-name" style="color:#be185d">⟐ ${esc(inst.label)}</div>
            <div class="node-uri">${linkify(esc(uri))}</div>
        `;

        // 1. Mostrar Comentario
        if (inst.comment) {
            const short = inst.comment.length > 320
                ? inst.comment.substring(0, 320) + '…'
                : inst.comment;
            html += `<div class="node-comment">${esc(short)}</div>`;
        }

        // 2. Mostrar Atributos / Literales (NUEVO)
        // Esto mostrará: nodeCount: 12, partitionName: "Adastra...", etc.
        if (inst.attributes && inst.attributes.length > 0) {
            html += `<div class="section-title">◈ Data Properties (Attributs)</div>`;
            inst.attributes.forEach(attr => {
                html += `
                <div class="prop-row">
                    <span class="prop-name" style="color:#666">${esc(attr.prop)}</span>
                    <span class="prop-arr">:</span>
                    <span style="font-weight:500; color:#333">${formatAttributeValue(attr.value)}</span>
                </div>`;
            });
        }

        // 3. Mostrar el Tipo (Clase)
        html += `<div class="section-title">▲ Type</div>`;
        html += `<span class="pill"
            style="background:${col}1a;color:${col};border-color:${col}40"
            data-nid="${esc(inst.type)}">${esc(classNode.length ? classNode.data('label') : 'Unknown')}</span>`;

        // 4. Mostrar Relaciones con otras Instancias (NUEVO)
        const edges = node.connectedEdges(':visible');
        const outRels = edges.filter(e => e.data('edgeType') === 'instanceRelation' && e.source().id() === uri);
        const inRels  = edges.filter(e => e.data('edgeType') === 'instanceRelation' && e.target().id() === uri);

        if (outRels.length > 0) {
            html += `<div class="section-title">→ Outgoing Relations (${outRels.length})</div>`;
            outRels.forEach(e => {
                const tgt = e.target();
                html += `<div class="prop-row">
                    <span class="prop-name">${esc(e.data('label'))}</span>
                    <span class="prop-arr">→</span>
                    <span class="prop-target" data-nid="${esc(tgt.id())}">${esc(tgt.data('label'))}</span>
                </div>`;
            });
        }

        if (inRels.length > 0) {
            html += `<div class="section-title">← Incoming Relations (${inRels.length})</div>`;
            inRels.forEach(e => {
                const src = e.source();
                html += `<div class="prop-row">
                    <span class="prop-target" data-nid="${esc(src.id())}">${esc(src.data('label'))}</span>
                    <span class="prop-arr">→</span>
                    <span class="prop-name">${esc(e.data('label'))}</span>
                </div>`;
            });
        }
    }

    const body = document.getElementById('infoBody');
    body.innerHTML = html;

    // Attach click handlers via delegation
    body.querySelectorAll('[data-nid]').forEach(el => {
        el.addEventListener('click', () => focusNode(el.dataset.nid));
    });
}

function resetInfoPanel() {
    document.getElementById('infoBody').innerHTML =
        '<div class="info-empty">Click on a node<br>to view its details.</div>';
}

function focusNode(id) {
    if (!cy) return;
    const node = cy.getElementById(id);
    if (!node.length) return;
    cy.animate({ center: { eles: node }, zoom: Math.max(cy.zoom(), 1.8) }, { duration: 300 });
    highlightNode(node);
    renderInfoPanel(node);
}

// ─────────────────────────────────────────────────────────────────
// Apply TBox colors to ABox nodes when TBox is hidden
// ─────────────────────────────────────────────────────────────────
function applyInstanceColoring() {
    if (!cy) return;

    cy.nodes('[type="instance"]').forEach(instNode => {
        // Get the class this instance belongs to
        const classType = instNode.data('classType'); // The class URI
        
        if (!showTBox && classType) {
            // TBox is hidden: apply the class color to the instance
            const classNode = cy.getElementById(classType);
            if (classNode.length > 0) {
                const classColor = classNode.data('nodeColor');
                // Apply TBox-like styling to the instance node
                instNode.style({
                    'background-color': classColor,
                    'background-opacity': 0.22,
                    'border-color': classColor,
                    'border-opacity': 0.95,
                    'border-width': 2,
                    'color': '#1f3550',
                    'font-weight': 600,
                    'shape': 'round-rectangle',
                    'width': 'label',
                    'height': 'label',
                    'font-style': 'normal'
                });
            }
        } else if (showTBox) {
            // TBox is visible: reset to default styling
            instNode.style({
                'background-color': '#ec4899',
                'background-opacity': 0.35,
                'border-color': '#be185d',
                'border-width': 1.5,
                'border-opacity': 0.85,
                'color': '#6b0551',
                'font-weight': 500,
                'font-style': 'italic',
                'shape': 'ellipse',
                'width': 'label',
                'height': 'label'
            });
        }
    });

    // Apply colors to instance relation edges when TBox is hidden
    cy.edges('[edgeType="instanceRelation"]').forEach(edge => {
        if (!showTBox) {
            // Get the source instance node
            const srcNode = edge.source();
            const srcClassType = srcNode.data('classType');
            
            if (srcClassType) {
                const classNode = cy.getElementById(srcClassType);
                if (classNode.length > 0) {
                    const classColor = classNode.data('nodeColor');
                    // Apply TBox-like edge styling
                    edge.style({
                        'line-color': classColor,
                        'target-arrow-color': classColor,
                        'opacity': 0.75,
                        'width': 1.5,
                        'line-style': 'solid'
                    });
                }
            }
        } else if (showTBox) {
            // Reset to default edge styling
            edge.style({
                'line-color': '#22c55e',
                'target-arrow-color': '#16a34a',
                'opacity': 0.9,
                'width': 2,
                'line-style': 'solid'
            });
        }
    });
}

// ─────────────────────────────────────────────────────────────────
// Edge visibility helpers
// ─────────────────────────────────────────────────────────────────
function applyEdgeVisibility() {
    if (!cy) return;
    // 1. Visibilidad básica de Nodos Clase (TBox)
    cy.nodes('[type="class"]').style('display', showTBox ? 'element' : 'none');

    cy.edges('[edgeType="instanceOf"]').style('display', showInstances ? 'element' : 'none');
    cy.edges('[edgeType="subClassOf"]').style('display', showSubclass  ? 'element' : 'none');
    cy.edges('[edgeType="objectProperty"]').style('display', showPropEdges ? 'element' : 'none');
    cy.edges('[edgeType="datatypeProperty"]').style('display', showDatatypeProps ? 'element' : 'none');

    
    // Mostrar/ocultar nodos de datatype según visibilidad
    cy.nodes('[type="datatype"]').forEach(node => {
        const hasVisibleEdge = node.connectedEdges().some(e => 
            e.style('display') === 'element' && e.data('edgeType') === 'datatypeProperty'
        );
        node.style('display', hasVisibleEdge ? 'element' : 'none');
    });



    // check this -----------------------------------------------
    // Toggle TBox-specific edges
    cy.edges('[edgeType="subClassOf"]').style('display', (showTBox && showSubclass) ? 'element' : 'none');
    
    cy.edges('[edgeType="objectProperty"]').style('display', (showTBox && showPropEdges) ? 'element' : 'none');
    
    cy.edges('[edgeType="datatypeProperty"]').style('display', (showTBox && showDatatypeProps) ? 'element' : 'none');

    // Instance of edge connects Abox to Tbox, so it only shows if BOTH are on
    cy.edges('[edgeType="instanceOf"]').style('display', (showInstances && showTBox) ? 'element' : 'none');

    // Instances (Abox) and their internal relations
    cy.nodes('[type="instance"]').style('display', showInstances ? 'element' : 'none');
    cy.edges('[edgeType="instanceRelation"]').style('display', showInstances ? 'element' : 'none');

    // Handle Datatype nodes visibility
    cy.nodes('[type="datatype"]').forEach(node => {
        const hasVisibleEdge = node.connectedEdges().some(e => 
            e.style('display') === 'element' && e.data('edgeType') === 'datatypeProperty'
        );
        node.style('display', hasVisibleEdge ? 'element' : 'none');
    });

    // NUEVO: Aplicar colores del TBox al ABox cuando TBox está oculto
    applyInstanceColoring();
}


function debug(...args) {
    if (DEBUG) console.log('[DEBUG]', ...args);
}

// ─────────────────────────────────────────────────────────────────
// Main processing pipeline
// ─────────────────────────────────────────────────────────────────
async function loadTTLWithImports(url, store, visited = new Set(), depth = 0) {
    const indent = '  '.repeat(depth);

    if (visited.has(url)) {
        debug(indent + '↩ already loaded:', url);
        return;
    }

    visited.add(url);

    debug(indent + '⬇ loading:', url);

    const res = await fetch(url);
    if (!res.ok) throw new Error(`Failed to load ${url}`);

    const text = await res.text();
    debug(indent + '   size:', text.length, 'chars');

    const quads = await parseTTL(text);
    debug(indent + '   quads parsed:', quads.length);

    store.addQuads(quads);
    debug(indent + '   store size now:', store.size);

    // Detect imports
    const imports = [];

    for (const q of quads) {
        if (
            q.predicate.value === OWL + 'imports' &&
            q.object.termType === 'NamedNode'
        ) {
            imports.push(q.object.value);
        }
    }

    debug(indent + '   imports found:', imports.length, imports);

    // Recurse
    for (const imp of imports) {
        await loadTTLWithImports(imp, store, visited, depth + 1);
    }
}

async function processText(ttlText, sourceName) {
    setLoading(true, 'Parsing du fichier TTL…');
    document.getElementById('welcome').style.display = 'none';

    let quads;
    try {
        quads = await parseTTL(ttlText);
    } catch(e) {
        setLoading(false);
        setStatus('Erreur de parsing');
        showToast('⚠ ' + e.message);
        document.getElementById('welcome').style.display = 'flex';
        return;
    }

    setLoading(true, 'Extracting ontology…');
    await new Promise(r => setTimeout(r, 20));  // let UI breathe

    const store = new N3.Store(quads);
    const ontology = extractOntology(store);
    parsedData = ontology;

    setLoading(true, 'Building graph…');
    await new Promise(r => setTimeout(r, 20));

    const { elements } = buildElements(ontology);
// Respect current toggle state
    const filtered = elements.filter(el => {
        if (!el.data.edgeType) {
            // Nodes: filter instances and datatypes
            if (el.data.type === 'instance' && !showInstances) return false;
            if (el.data.type === 'datatype') return true; // Will be hidden via edge visibility
            return true;
        }
        if (el.data.edgeType === 'subClassOf'        && !showSubclass)      return false;
        if (el.data.edgeType === 'objectProperty'    && !showPropEdges)     return false;
        if (el.data.edgeType === 'datatypeProperty'  && !showDatatypeProps) return false;
        if (el.data.edgeType === 'instanceOf'        && !showInstances)     return false;
        return true;
    });

    initCytoscape(filtered);

    const layoutName = document.getElementById('layoutSelect').value;
    applyLayout(layoutName);
    applyEdgeVisibility();

    // Count stats
    const nClass  = ontology.classes.size;
    const nSub    = ontology.subClassEdges.length;
    const nProps  = [...ontology.properties.values()]
        .filter(p => p.domains.length && p.ranges.length).length;
    const nPEdges = elements.filter(e => e.data.edgeType === 'objectProperty').length;
    const nDatatype = ontology.datatypeProperties.size;
    const nDTEdges = elements.filter(e => e.data.edgeType === 'datatypeProperty').length;
    const nInst   = ontology.instances.size;
    const nInstEdges = elements.filter(e => e.data.edgeType === 'instanceOf').length;

    document.getElementById('statsArea').innerHTML = `
        <div class="chip"><em>${nClass}</em> classes</div>
        <div class="chip"><em>${nSub}</em> subClassOf</div>
        <div class="chip"><em>${nPEdges}</em> object props</div>
        <div class="chip"><em>${nDatatype}</em> datatype props</div>
        <div class="chip"><em>${nInst}</em> instances</div>
    `;

    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('legend').style.display  = 'flex';
    setStatus(`${nClass} classes · ${nInst} instances · ${nPEdges} object props · ${nDTEdges} datatype props — ${sourceName}`);
    setLoading(false);
}

async function processStore(store, sourceName) {
    setLoading(true, 'Extracting ontology…');
    document.getElementById('welcome').style.display = 'none';
    await new Promise(r => setTimeout(r, 20));

    const ontology = extractOntology(store);
    parsedData = ontology;

    setLoading(true, 'Building graph…');
    await new Promise(r => setTimeout(r, 20));

    const { elements } = buildElements(ontology);

    initCytoscape(elements);

    const layoutName = document.getElementById('layoutSelect').value;
    applyLayout(layoutName);
    applyEdgeVisibility();

    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('legend').style.display  = 'flex';

    setStatus('Loaded with imports → ' + sourceName);
    setLoading(false);
}
// ─────────────────────────────────────────────────────────────────
// Load from URL
// ─────────────────────────────────────────────────────────────────
async function loadFromURL(url) {
    setLoading(true, 'Uploading…');
    setStatus('Uploading on going…');

    let text;
    try {
        const store = new N3.Store();

        await loadTTLWithImports(url, store);

        await processStore(store, url);

    } catch (e) {
        setLoading(false);
        setStatus('Network error');
        showToast('⚠ ' + e.message);
        document.getElementById('welcome').style.display = 'flex';
        return;
    }

}


function loadFromFile(file) {
    const reader = new FileReader();

    reader.onload = async (e) => {
        try {
            const store = new N3.Store();

            const text = e.target.result;
            const quads = await parseTTL(text);

            // Add main file
            store.addQuads(quads);

            // Detect owl:imports
            const imports = [];

            for (const q of quads) {
                if (
                    q.predicate.value === OWL + 'imports' &&
                    q.object.termType === 'NamedNode'
                ) {
                    imports.push(q.object.value);
                }
            }

            // Load imported ontologies (via URL)
            for (const imp of imports) {
                showToast(imp);
                await loadTTLWithImports(imp, store);
            }

            // Process everything
            await processStore(store, file.name);

        } catch (err) {
            showToast('⚠ File processing error: ' + err.message);
        }
    };

    reader.onerror = () => showToast('⚠ File reading error');

    reader.readAsText(file, 'utf-8');
}

document.getElementById('searchInput').addEventListener('input', function() {
    if (!cy) return;
    const q = this.value.trim().toLowerCase();

    if (!q) {
        cy.elements().removeClass('hl dim');
        return;
    }

    cy.batch(() => {
        cy.elements().addClass('dim').removeClass('hl');
        cy.nodes().filter(n => {
            return n.data('label').toLowerCase().includes(q)
                || n.id().toLowerCase().includes(q);
        }).addClass('hl').removeClass('dim').connectedEdges(':visible')
            .addClass('hl').removeClass('dim')
            .connectedNodes().addClass('hl').removeClass('dim');
    });
});
